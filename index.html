<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pigeon Ultra Pro</title>
    <style>
        :root { --yt-black: #0f0f0f; --yt-border: #272727; --pigeon: #1DA1F2; --text: #ffffff; --gray: #aaaaaa; }
        * { box-sizing: border-box; font-family: "Roboto", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--yt-black); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- AUTH SYSTEM --- */
        .auth-input { padding:12px; width:260px; border-radius:8px; border:1px solid #333; margin-bottom:10px; background:#111; color:white; outline:none; }
        #recovery-display { display:none; background:#1a1a1a; padding:15px; border-radius:10px; margin-bottom:15px; border:1px dashed var(--pigeon); font-size:12px; width:260px; word-break:break-all; }

        /* --- YT BOTTOM BAR --- */
        nav { height: 50px; border-top: 1px solid var(--yt-border); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; background: #000; z-index: 1000; }
        .nav-item { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; font-size: 18px; flex: 1; opacity: 0.9; cursor: pointer; }
        .nav-text { font-size: 10px; margin-top: 3px; }
        .plus-btn { font-size: 32px; }

        /* --- CARDS & POLLS & COMMENTS --- */
        #app { margin-top: 56px; margin-bottom: 50px; height: calc(100vh - 106px); overflow-y: auto; }
        header { height: 56px; border-bottom: 1px solid var(--yt-border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: fixed; top: 0; width: 100%; background: #000; z-index: 1000; }
        .card { padding: 15px; border-bottom: 8px solid var(--yt-border); }
        .action-bar { display: flex; gap: 20px; margin-top: 15px; color: var(--gray); font-size: 13px; cursor: pointer; }
        
        .poll-v { margin-top: 10px; }
        .poll-opt { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #333; position: relative; overflow: hidden; display: flex; justify-content: space-between; cursor: pointer; }
        .poll-fill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(29, 161, 242, 0.2); transition: 0.4s ease; pointer-events: none; }
        
        .c-input { width:100%; background:#111; color:white; border:1px solid #333; padding:8px; border-radius:5px; margin-top:10px; outline:none; }
        .mini-avatar { background:#222; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        
        /* --- GAME --- */
        #game-overlay { display:none; position:fixed; inset:0; background: #4ec0ca; z-index: 20000; }
        #game-bird { position: absolute; font-size: 40px; left: 50px; user-select: none; }
    </style>
</head>
<body>

    <div id="id-gate" style="position:fixed; inset:0; background:#000; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 20px;">
        <h1 style="color:var(--pigeon); font-size:40px; margin:0;">🕊️</h1>
        <h2 style="font-size:18px; margin-bottom:20px;">Join Pigeon</h2>
        <input type="text" id="u-name" class="auth-input" placeholder="Handle (5-10)">
        <input type="password" id="u-pass" class="auth-input" placeholder="Password">
        <div id="recovery-display"><b style="color:var(--pigeon)">RECOVERY KEY:</b><br><span id="key-text"></span></div>
        <p style="font-size:12px; color:var(--gray); margin:0 0 5px 0;">Pick your Avatar:</p>
        <div id="emoji-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; height:120px; width:260px; overflow-y:auto; margin-bottom:15px; background:#111; padding:10px; border-radius:10px;"></div>
        <button id="main-auth-btn" onclick="register()" style="background:var(--pigeon); color:white; border:none; padding:12px 60px; border-radius:25px; font-weight:bold; cursor:pointer;">CREATE ACCOUNT</button>
    </div>

    <div id="main-ui" style="display:none">
        <header>
            <div style="font-size:24px;">☰</div>
            <div onclick="initFlappy()" style="font-weight:900; font-size:20px; color:var(--pigeon); cursor:pointer;">🕊️ PIGEON</div>
            <div style="font-size:18px;">🔍 🔔</div>
        </header>

        <main id="app"><div id="feed"></div></main>
        
        <nav>
            <div class="nav-item" onclick="location.reload()">🏠<span class="nav-text">Home</span></div>
            <div class="nav-item">🎬<span class="nav-text">Shorts</span></div>
            <div class="nav-item plus-btn" onclick="openStudio()">⊕</div>
            <div class="nav-item">📺<span class="nav-text">Subs</span></div>
            <div class="nav-item" onclick="alert('Profile: @'+userHandle+'\nRecovery Key: '+recoveryKey)">👤<span class="nav-text">You</span></div>
        </nav>
    </div>

    <div id="studio" style="position:fixed; inset:0; background:#000; z-index:9000; display:none; flex-direction:column; padding:20px;">
        <div style="display:flex; justify-content:space-between;"><span onclick="closeStudio()" style="font-size:24px;">✕</span><button onclick="postNow()" style="background:var(--pigeon); color:white; border:none; border-radius:20px; padding:5px 15px; font-weight:bold;">Post</button></div>
        <textarea id="post-text" placeholder="What's happening?" style="width:100%; height:120px; background:none; border:none; color:white; font-size:18px; margin-top:20px; outline:none;"></textarea>
        <div id="poll-inputs" style="margin-top:20px; border-top:1px dashed #333; padding-top:15px;">
            <p style="margin:0 0 10px 0; color:var(--gray); font-size:13px;">Add a Poll (Optional)</p>
            <input type="text" class="auth-input poll-opt-in" placeholder="Option 1">
            <input type="text" class="auth-input poll-opt-in" placeholder="Option 2">
        </div>
    </div>

    <div id="game-overlay">
        <div style="text-align:center; padding:20px; color:white; font-weight:bold; z-index:20001; position:relative;">Score: <span id="game-score">0</span> | <button onclick="stopFlappy()">Exit</button><br><small>Tap to jump!</small></div>
        <div id="game-bird">🕊️</div>
    </div>

    <script>
        let userHandle = "", userEmoji = "👤", recoveryKey = "", allPosts = [];
        let openComms = [], openReps = []; // Keeps track of open comment/reply tabs

        // Generate 1000 Emojis
        const grid = document.getElementById('emoji-grid');
        for(let i=128512; i<129512; i++){
            let s = document.createElement('span'); s.innerHTML = `&#${i};`;
            s.style.cursor = 'pointer';
            s.onclick = function(){ Array.from(grid.children).forEach(c=>c.style.background='none'); this.style.background='var(--pigeon)'; userEmoji=this.innerHTML; };
            grid.appendChild(s);
        }

        function register() {
            userHandle = document.getElementById('u-name').value;
            if(userHandle.length < 5) return alert("Handle min 5 chars");
            recoveryKey = "PG-" + Math.random().toString(36).substr(2, 10).toUpperCase();
            document.getElementById('key-text').innerText = recoveryKey;
            document.getElementById('recovery-display').style.display = "block";
            document.getElementById('main-auth-btn').innerText = "ENTER PIGEON";
            document.getElementById('main-auth-btn').onclick = () => {
                document.getElementById('id-gate').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                renderFeed(); // Show blank feed or instructions
            };
        }

        function openStudio() { document.getElementById('studio').style.display = 'flex'; }
        function closeStudio() { document.getElementById('studio').style.display = 'none'; }

        function postNow() {
            const opts = Array.from(document.querySelectorAll('.poll-opt-in')).map(i => ({ text: i.value, votes: 0, voters: [] })).filter(o => o.text);
            allPosts.unshift({ 
                id: Date.now(), user: userHandle, emoji: userEmoji, 
                text: document.getElementById('post-text').value, 
                poll: opts.length > 0 ? opts : null, 
                likes: 0, dislikes: 0, comments: [] 
            });
            document.getElementById('post-text').value = ""; // clear
            document.querySelectorAll('.poll-opt-in').forEach(i => i.value = ""); // clear
            renderFeed(); closeStudio();
        }

        function toggle(type, id) {
            let arr = type === 'C' ? openComms : openReps;
            if(arr.includes(id)) arr.splice(arr.indexOf(id), 1); else arr.push(id);
            renderFeed();
        }

        function renderFeed() {
            if(allPosts.length === 0) return document.getElementById('feed').innerHTML = "<p style='text-align:center; padding:20px; color:var(--gray);'>Feed is empty. Be the first to post!</p>";

            document.getElementById('feed').innerHTML = allPosts.map(post => `
                <div class="card">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                        <div class="mini-avatar" style="width:35px; height:35px; font-size:20px;">${post.emoji}</div>
                        <b>@${post.user}</b>
                    </div>
                    <p style="margin:5px 0 10px 0;">${post.text}</p>
                    
                    ${post.poll ? `
                    <div class="poll-v">
                        ${post.poll.map((opt, i) => {
                            const total = post.poll.reduce((a, b) => a + b.votes, 0);
                            const pct = total === 0 ? 0 : Math.round((opt.votes / total) * 100);
                            return `
                                <div class="poll-opt" onclick="castVote(${post.id}, ${i})">
                                    <div class="poll-fill" style="width:${pct}%"></div>
                                    <span style="position:relative">${opt.voters.includes(userHandle) ? '●' : '○'} ${opt.text}</span>
                                    <span style="position:relative">${pct}%</span>
                                </div>`;
                        }).join('')}
                    </div>` : ''}

                    <div class="action-bar">
                        <span onclick="actP(${post.id}, 'L')">👍 ${post.likes}</span>
                        <span onclick="actP(${post.id}, 'D')">👎 ${post.dislikes}</span>
                        <span onclick="toggle('C', ${post.id})">💬 ${post.comments.length}</span>
                    </div>

                    <div style="display: ${openComms.includes(post.id) ? 'block' : 'none'}; margin-top:10px; padding-left:10px; border-left:2px solid #333;">
                        ${post.comments.map(c => `
                            <div style="margin-top:12px;">
                                <div style="display:flex; gap:8px; align-items:center;">
                                    <div class="mini-avatar" style="width:20px; height:20px; font-size:12px;">${c.emoji}</div>
                                    <span style="font-size:13px;"><b>@${c.user}</b>: ${c.text}</span>
                                </div>
                                <div style="font-size:11px; color:var(--gray); display:flex; gap:12px; margin-top:4px; margin-left:28px;">
                                    <span onclick="actC(${post.id}, ${c.id}, 'L')" style="cursor:pointer">👍 ${c.likes}</span>
                                    <span onclick="actC(${post.id}, ${c.id}, 'D')" style="cursor:pointer">👎 ${c.dislikes}</span>
                                    <span onclick="toggle('R', ${c.id})" style="cursor:pointer; color:var(--pigeon)">Reply</span>
                                </div>

                                <div style="display: ${openReps.includes(c.id) ? 'block' : 'none'}; margin-left:28px; margin-top:5px; border-left:1px dashed #444; padding-left:10px;">
                                    ${c.replies.map(r => `
                                        <div style="margin-top:6px; display:flex; gap:6px; align-items:center;">
                                            <div class="mini-avatar" style="width:16px; height:16px; font-size:10px;">${r.emoji}</div>
                                            <span style="font-size:12px; color:#ddd;"><b>@${r.user}</b>: ${r.text}</span>
                                        </div>
                                    `).join('')}
                                    <input type="text" class="c-input" style="padding:5px; font-size:11px;" placeholder="Reply to @${c.user}... (Press Enter)" onkeydown="if(event.key==='Enter') addReply(${post.id}, ${c.id}, this)">
                                </div>
                            </div>
                        `).join('')}
                        <input type="text" class="c-input" placeholder="Add a comment... (Press Enter)" onkeydown="if(event.key==='Enter') addComm(${post.id}, this)">
                    </div>
                </div>
            `).join('');
        }

        function castVote(pid, idx) {
            const p = allPosts.find(x => x.id === pid);
            if(p.poll.some(o => o.voters.includes(userHandle))) return alert("One vote per account!");
            p.poll[idx].votes++; p.poll[idx].voters.push(userHandle); renderFeed();
        }

        // Post actions
        function actP(pid, act) { const p=allPosts.find(x=>x.id===pid); act==='L'?p.likes++:p.dislikes++; renderFeed(); }
        // Comment actions
        function actC(pid, cid, act) { const c=allPosts.find(x=>x.id===pid).comments.find(y=>y.id===cid); act==='L'?c.likes++:c.dislikes++; renderFeed(); }

        function addComm(pid, el) {
            if(!el.value.trim()) return;
            allPosts.find(p=>p.id===pid).comments.push({ id: Date.now(), user: userHandle, emoji: userEmoji, text: el.value, likes: 0, dislikes: 0, replies: [] });
            el.value = ""; if(!openComms.includes(pid)) openComms.push(pid); renderFeed();
        }

        function addReply(pid, cid, el) {
            if(!el.value.trim()) return;
            allPosts.find(p=>p.id===pid).comments.find(c=>c.id===cid).replies.push({ id: Date.now(), user: userHandle, emoji: userEmoji, text: el.value });
            el.value = ""; if(!openReps.includes(cid)) openReps.push(cid); renderFeed();
        }

        // Flappy Game
        let bY = 200, bV = 0, gLoop, score=0;
        function initFlappy() {
            document.getElementById('game-overlay').style.display = 'block';
            bY = window.innerHeight / 2; bV = 0; score = 0; document.getElementById('game-score').innerText = score;
            document.getElementById('game-overlay').onclick = () => { bV = -8; score++; document.getElementById('game-score').innerText = score; };
            gLoop = setInterval(() => {
                bV += 0.5; bY += bV;
                document.getElementById('game-bird').style.top = bY + "px";
                if(bY > window.innerHeight || bY < 0) stopFlappy();
            }, 30);
        }
        function stopFlappy() { clearInterval(gLoop); document.getElementById('game-overlay').style.display = 'none'; alert("Game Over! Score: " + score); }
    </script>
</body>
</html>
