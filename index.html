    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        .gate { position: fixed; inset: 0; z-index: 9999; display: flex; items: center; justify-content: center; background: #075e54; }
        .hidden { display: none !important; }
        #sidebar { transform: translateX(-100%); transition: 0.3s; position: fixed; inset: 0; width: 260px; background: #111; z-index: 8000; border-right: 1px solid #333; }
        #sidebar.open { transform: translateX(0); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 7000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .logo-text { background: linear-gradient(to right, #25d366, #1da1f2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    </style>
</head>
<body>

    <div id="step1" class="gate">
        <div class="bg-white p-8 rounded-3xl text-black text-center w-80 shadow-2xl">
            <h1 class="text-5xl mb-4">🕊️</h1>
            <h2 class="text-2xl font-black mb-4 uppercase">Unlock Pigeon</h2>
            <p class="text-gray-500 mb-6 text-sm">Subscribe to verify your account.</p>
            <a href="https://www.youtube.com/@YOUR_CHANNEL?sub_confirmation=1" target="_blank" onclick="showUnlock()" class="block bg-red-600 text-white py-4 rounded-xl font-black mb-4">SUBSCRIBE</a>
            <button id="unlockBtn" onclick="openApp()" class="hidden w-full bg-green-500 text-black font-bold py-3 rounded-xl">ENTER SITE</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="fixed top-0 w-full bg-[#050505] p-4 flex justify-between items-center border-b border-gray-900 z-50">
            <div class="flex items-center space-x-4">
                <i class="fa-solid fa-bars text-xl cursor-pointer" onclick="toggleMenu()"></i>
                <span class="logo-text text-2xl uppercase italic cursor-pointer" onclick="openGame()">Pigeon</span>
            </div>
            <div class="w-10 h-10 rounded-full bg-blue-600"></div>
        </header>

        <main id="feed" class="max-w-xl mx-auto pt-24 px-4 space-y-6 pb-28">
            </main>

        <nav class="fixed bottom-0 w-full bg-[#050505] border-t border-gray-900 flex justify-around items-center py-5 z-50">
            <i class="fa-solid fa-house text-xl"></i>
            <button onclick="openPostModal()" class="bg-white text-black w-14 h-14 rounded-full -mt-12 shadow-2xl flex items-center justify-center">
                <i class="fa-solid fa-plus text-3xl"></i>
            </button>
            <i class="fa-solid fa-user text-xl"></i>
        </nav>
    </div>

    <div id="postModal" class="modal">
        <div class="bg-[#111] p-6 rounded-3xl w-full max-w-lg border border-gray-700">
            <h2 class="font-bold text-green-500 mb-4">NEW POST</h2>
            <textarea id="postText" placeholder="What's happening?" class="bg-transparent w-full h-24 text-xl outline-none mb-4"></textarea>
            <input type="text" id="mediaUrl" placeholder="Paste Image or Video URL (Optional)" class="bg-[#222] w-full p-3 rounded-xl mb-4 text-sm outline-none border border-gray-800">
            
            <div class="flex gap-2">
                <button onclick="submitPost('image')" class="flex-1 bg-blue-600 py-2 rounded-xl text-xs font-bold uppercase">Add Image</button>
                <button onclick="submitPost('video')" class="flex-1 bg-purple-600 py-2 rounded-xl text-xs font-bold uppercase">Add Video</button>
                <button onclick="submitPost('text')" class="flex-1 bg-green-500 text-black py-2 rounded-xl text-xs font-bold">Text Only</button>
            </div>
            <button onclick="closePost()" class="w-full mt-4 text-gray-500 text-xs uppercase">Cancel</button>
        </div>
    </div>

    <div id="gameScreen" class="modal">
        <canvas id="gameCanvas" width="320" height="400" class="border-2 border-white rounded-xl"></canvas>
        <button onclick="closeGame()" class="mt-4 bg-red-600 px-6 py-2 rounded-full">EXIT</button>
    </div>

    <script>
        function showUnlock() { setTimeout(() => { document.getElementById('unlockBtn').classList.remove('hidden'); }, 2000); }
        function openApp() { document.getElementById('step1').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); document.body.style.overflow="auto"; }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function openPostModal() { document.getElementById('postModal').style.display = 'flex'; }
        function closePost() { document.getElementById('postModal').style.display = 'none'; }

        function submitPost(type) {
            const text = document.getElementById('postText').value;
            const url = document.getElementById('mediaUrl').value;
            if(!text && !url) return;

            const card = document.createElement('div');
            card.className = "bg-[#111] p-4 rounded-2xl border border-gray-800 mb-4";
            
            let mediaHtml = '';
            if(type === 'image' && url) mediaHtml = `<img src="${url}" class="w-full rounded-xl mb-4">`;
            if(type === 'video' && url) mediaHtml = `<video src="${url}" controls class="w-full rounded-xl mb-4"></video>`;

            card.innerHTML = `
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-8 h-8 rounded-full bg-gray-700"></div>
                    <span class="font-bold text-sm text-gray-300">User</span>
                </div>
                ${mediaHtml}
                <p class="text-lg">${text}</p>
                <div class="mt-4 flex gap-6 text-gray-600"><i class="fa-solid fa-heart"></i><i class="fa-solid fa-share"></i></div>
            `;
            
            document.getElementById('feed').prepend(card);
            document.getElementById('postText').value = ""; document.getElementById('mediaUrl').value = "";
            closePost();
        }

        // Game Logic (Flappy)
        const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
        let b = {y:200, v:0}, active = false;
        function openGame() { document.getElementById('gameScreen').style.display = 'flex'; active=true; loop(); }
        function closeGame() { document.getElementById('gameScreen').style.display = 'none'; active=false; }
        function loop() {
            if(!active) return;
            ctx.fillStyle = "#4ec0ca"; ctx.fillRect(0,0,320,400);
            b.v += 0.4; b.y += b.v; ctx.font = "30px Arial"; ctx.fillText("🕊️", 50, b.y);
            if(b.y > 400 || b.y < 0) b.y = 200;
            requestAnimationFrame(loop);
        }
        cvs.onmousedown = () => { b.v = -7; };
    </script>
</body>
</html>
