<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon / X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #15202b; color: white; }
        .twitter-blue { background-color: #1d9bf0; }
        .twitter-border { border-color: #38444d; }
        .twitter-hover:hover { background-color: rgba(29, 155, 240, 0.1); }
        .game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #gameCanvas { background: #15202b; border: 2px solid #1d9bf0; border-radius: 15px; }
        #loginOverlay { position: fixed; inset: 0; background: #15202b; z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="font-sans">

    <div id="loginOverlay">
        <div class="p-8 text-center max-w-sm w-full mx-4">
            <i class="fa-solid fa-pigeon text-6xl text-white mb-8"></i>
            <h2 class="text-3xl font-black mb-8">Happening now.</h2>
            <h3 class="text-xl font-bold mb-4">Join Pigeon today.</h3>
            <button onclick="signIn()" class="w-full bg-white text-black font-bold py-3 rounded-full hover:bg-gray-200 transition mb-4">
                Sign in to Pigeon
            </button>
            <p class="text-xs text-gray-500">By signing in, you agree to the Pigeon Terms of Service.</p>
        </div>
    </div>

    <header class="border-b twitter-border p-3 flex justify-between items-center sticky top-0 z-50 bg-[#15202b]/80 backdrop-blur-md">
        <div class="flex items-center space-x-2 cursor-pointer group" onclick="startGame()">
            <div class="p-2 rounded-full group-hover:bg-blue-500/10 transition">
                <i class="fa-solid fa-pigeon text-2xl text-[#1d9bf0]"></i>
            </div>
            <span class="text-xl font-bold hidden sm:block">Pigeon</span>
        </div>

        <div class="font-bold text-lg">Home</div>

        <div class="flex items-center space-x-3 bg-white/5 py-1 px-4 rounded-full border twitter-border hover:bg-white/10 cursor-pointer">
            <div class="w-8 h-8 rounded-full bg-blue-400 flex items-center justify-center">
                <i class="fa-solid fa-user text-sm text-white"></i>
            </div>
            <div class="text-left">
                <p class="text-xs font-bold leading-none">@pigeon_user</p>
                <p class="text-[10px] text-blue-400">✓ Subscribed</p>
            </div>
        </div>
    </header>

    <div id="gameScreen" class="game-overlay">
        <div class="mb-4 text-center">
            <h2 class="text-2xl font-black text-blue-400">PIGEON FLYER</h2>
            <p class="text-gray-400 text-sm">Tap or Space to flap</p>
        </div>
        <canvas id="gameCanvas" width="320" height="400"></canvas>
        <button onclick="closeGame()" class="mt-6 border border-red-500 text-red-500 px-10 py-2 rounded-full font-bold hover:bg-red-500/10">Quit Game</button>
    </div>

    <main class="max-w-2xl mx-auto border-x twitter-border min-h-screen">
        
        <div class="p-4 border-b twitter-border">
            <div class="flex space-x-4">
                <div class="w-12 h-12 rounded-full bg-gray-600 flex-shrink-0"></div>
                <div class="w-full">
                    <textarea placeholder="What is happening?!" class="w-full bg-transparent text-xl outline-none resize-none h-20" rows="2"></textarea>
                    
                    <div class="flex justify-between items-center border-t twitter-border pt-3">
                        <div class="flex space-x-4 text-[#1d9bf0] text-lg">
                            <i class="fa-solid fa-image cursor-pointer p-2 rounded-full twitter-hover"></i>
                            <i class="fa-solid fa-square-poll-vertical cursor-pointer p-2 rounded-full twitter-hover"></i>
                            <i class="fa-solid fa-face-smile cursor-pointer p-2 rounded-full twitter-hover"></i>
                            <i class="fa-solid fa-location-dot cursor-pointer p-2 rounded-full twitter-hover"></i>
                            <i class="fa-solid fa-video cursor-pointer p-2 rounded-full twitter-hover"></i>
                        </div>
                        <button class="twitter-blue text-white px-6 py-2 rounded-full font-bold hover:opacity-90">Post</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="divide-y twitter-border">
            <div class="p-4 hover:bg-white/[0.02] transition cursor-pointer">
                <div class="flex space-x-3">
                    <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center">🐦</div>
                    <div>
                        <div class="flex items-center space-x-1">
                            <span class="font-bold">Pigeon Official</span>
                            <span class="text-gray-500 text-sm">@pigeon · 1h</span>
                        </div>
                        <p class="mt-1">Welcome to my site! This is my main page where we talk about all things pigeon. 🐦✨</p>
                        <div class="flex justify-between mt-3 text-gray-500 max-w-md">
                            <i class="fa-regular fa-comment hover:text-blue-400"></i>
                            <i class="fa-solid fa-retweet hover:text-green-400"></i>
                            <i class="fa-regular fa-heart hover:text-pink-500"></i>
                            <i class="fa-solid fa-chart-simple hover:text-blue-400"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Sign In Transition
        function signIn() {
            const overlay = document.getElementById('loginOverlay');
            overlay.style.transition = 'opacity 0.5s ease';
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        }

        // Flappy Game Engine
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let bird = { x: 50, y: 150, v: 0, g: 0.4, jump: -7 };
        let pipes = [];
        let score = 0;
        let active = false;
        let req;

        function startGame() {
            document.getElementById('gameScreen').style.display = 'flex';
            pipes = []; bird.y = 150; bird.v = 0; score = 0;
            active = true;
            loop();
        }

        function closeGame() {
            active = false;
            cancelAnimationFrame(req);
            document.getElementById('gameScreen').style.display = 'none';
        }

        function loop() {
            if(!active) return;
            ctx.fillStyle = "#15202b";
            ctx.fillRect(0,0,320,400);
            
            bird.v += bird.g;
            bird.y += bird.v;
            ctx.font = "30px serif";
            ctx.fillText("🐦", bird.x, bird.y);

            if(pipes.length === 0 || pipes[pipes.length-1].x < 150) {
                pipes.push({x:320, h:Math.random()*150+50});
            }

            pipes.forEach((p) => {
                p.x -= 2.5;
                ctx.fillStyle = "#1d9bf0";
                ctx.fillRect(p.x, 0, 45, p.h);
                ctx.fillRect(p.x, p.h + 110, 45, 400);
                
                // Collision
                if(bird.x+20 > p.x && bird.x < p.x+45 && (bird.y-15 < p.h || bird.y > p.h+95)) active = false;
                if(p.x === 50) score++;
            });
            pipes = pipes.filter(p => p.x > -50);

            if(bird.y > 400 || bird.y < 0) active = false;
            
            ctx.fillStyle = "white";
            ctx.font = "bold 20px Arial";
            ctx.fillText("Score: " + score, 20, 40);
            if(active) req = requestAnimationFrame(loop);
            else {
                ctx.fillStyle = "rgba(255,0,0,0.5)";
                ctx.fillRect(0,0,320,400);
                ctx.fillStyle = "white";
                ctx.fillText("CRASHED!", 110, 200);
            }
        }

        window.onkeydown = (e) => { if(e.code === 'Space') bird.v = bird.jump; };
        canvas.onmousedown = () => { bird.v = bird.jump; };
    </script>
</body>
</html>
