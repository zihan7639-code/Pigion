<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pigeon Ultra | Pro</title>
    <style>
        :root { --pigeon: #1DA1F2; --dark: #000; --gray: #16181c; --border: #2f3336; --text: #f7f9f9; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; }
        .overlay { position: fixed; inset: 0; background: white; color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; padding: 20px; text-align: center; }
        .black-bg { background: var(--dark) !important; color: white !important; display: none; }
        header { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; background: var(--dark); z-index:1000;}
        nav { height: 65px; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; background: var(--dark); z-index:1000;}
        #app { display: none; margin: 50px 0 65px; height: calc(100vh - 115px); overflow-y: auto; }
        .card { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 1.5px solid var(--pigeon); }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; background: #eee; padding: 10px; border-radius: 12px; margin: 15px 0; }
        .emoji-opt { font-size: 24px; cursor: pointer; padding: 5px; border-radius: 8px; }
        .emoji-opt.selected { background: var(--pigeon); color: white; }
        .post-media { width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid var(--border); }
        #composer { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: none; flex-direction: column; padding: 20px; }
        textarea { width: 100%; height: 150px; background: none; border: none; color: white; font-size: 18px; outline: none; margin-top: 20px; }
        .tool-btn { background: var(--gray); border: none; color: white; padding: 10px; border-radius: 10px; margin: 5px; cursor: pointer; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="sub-choice" class="overlay">
        <h1 style="font-size:40px">🕊️</h1>
        <h2>Pigeon Ultra</h2>
        <button onclick="goSub()" style="padding:15px; background:var(--pigeon); color:white; border-radius:25px; border:none; width:260px; font-weight:bold;">1. Subscribe to Ultra</button>
        <button onclick="goVerify()" style="margin-top:10px; padding:15px; border-radius:25px; border:none; width:260px;">2. I have subscribed</button>
    </div>

    <div id="verify-screen" class="overlay black-bg">
        <div style="border:4px solid #333; border-top-color:#fff; width:40px; height:40px; border-radius:50%; animation:spin 1s linear infinite"></div>
        <h3>Verifying Subscription...</h3>
    </div>

    <div id="gate" class="overlay" style="display:none">
        <h3>Create Your Identity</h3>
        <div class="emoji-grid" id="emoji-picker"></div>
        <input type="text" id="username" placeholder="Name (5-10 chars)" maxlength="10" style="padding:12px; border-radius:10px; width:280px;">
        <button onclick="finalize()" style="margin-top:15px; padding:12px 40px; background:black; color:white; border-radius:25px; border:none; font-weight:bold;">Done</button>
    </div>

    <div id="main-ui" style="display:none">
        <header>
            <span>☰</span><b style="color:var(--pigeon)">🕊️ PIGEON</b>
            <div id="top-avatar" class="user-avatar" onclick="openTab('you')">👤</div>
        </header>

        <main id="app">
            <div id="feed-view"></div>
            <div id="games-view" style="display:none; text-align:center; padding:40px;">
                <h2>🕊️ Clicker XP</h2>
                <div id="xp-display" style="font-size:40px; color:var(--pigeon)">0</div>
                <button onclick="tapGame()" style="font-size:80px; background:none; border:none;">🕊️</button>
            </div>
            <div id="you-view" style="display:none; text-align:center; padding:20px;">
                <div id="big-avatar" style="font-size:60px">👤</div>
                <h2 id="prof-name">@User</h2>
                <div id="my-feed"></div>
            </div>
        </main>

        <div id="composer">
            <div style="display:flex; justify-content:space-between;">
                <span onclick="closePost()" style="font-size:24px">✕</span>
                <button onclick="publish()" id="pub-btn" style="background:var(--pigeon); color:white; border:none; padding:8px 20px; border-radius:20px; font-weight:bold;">Done</button>
            </div>
            <textarea id="p-text" placeholder="What's happening?"></textarea>
            <div id="pre" style="color:var(--pigeon); font-size:12px;"></div>
            <input type="file" id="f-in" hidden onchange="document.getElementById('pre').innerText='📎 File attached'">
            <button class="tool-btn" onclick="document.getElementById('f-in').click()">+ Media (Image/Video)</button>
        </div>

        <nav>
            <button onclick="openTab('home')" style="background:none; border:none; color:white; font-size:20px">🏠</button>
            <button onclick="openTab('games')" style="background:none; border:none; color:white; font-size:20px">🎮</button>
            <button onclick="openPost()" style="background:none; border:none; color:var(--pigeon); font-size:30px">⊕</button>
            <button onclick="openTab('you')" style="background:none; border:none; color:white; font-size:20px">👤</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCrAjMOIh0yD9Vp6Zdp8MJ2qjip8dstdI",
            authDomain: "pigeon-platform.firebaseapp.com",
            projectId: "pigeon-platform",
            storageBucket: "pigeon-platform.firebasestorage.app",
            messagingSenderId: "322112493288",
            appId: "1:322112493288:web:f6e5ed8e0c1abb1c469b5d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.myName = ""; window.selectedEmoji = "👤"; window.subReady = false; window.xp = 0;

        // EMOJI PICKER
        const emojis = ["🕊️", "🔥", "💎", "🚀", "👑", "🦁", "👾", "😎", "🍕"];
        const picker = document.getElementById('emoji-picker');
        emojis.forEach(e => {
            const s = document.createElement('span'); s.className='emoji-opt'; s.innerText=e;
            s.onclick = () => { document.querySelectorAll('.emoji-opt').forEach(o=>o.classList.remove('selected')); s.classList.add('selected'); window.selectedEmoji=e; };
            picker.appendChild(s);
        });

        // GATES
        window.goSub = () => { window.open("https://youtube.com/@Ultra-wk8ed"); window.subReady = true; };
        window.goVerify = () => {
            if(!window.subReady) return alert("Sub first!");
            document.getElementById('sub-choice').style.display='none';
            document.getElementById('verify-screen').style.display='flex';
            setTimeout(() => { document.getElementById('verify-screen').style.display='none'; document.getElementById('gate').style.display='flex'; }, 5000);
        };

        window.finalize = () => {
            const u = document.getElementById('username').value;
            if(u.length < 5) return alert("Name too short!");
            window.myName = u;
            document.getElementById('top-avatar').innerText = window.selectedEmoji;
            document.getElementById('big-avatar').innerText = window.selectedEmoji;
            document.getElementById('prof-name').innerText = "@"+u;
            document.getElementById('gate').style.display='none';
            document.getElementById('main-ui').style.display='block';
            document.getElementById('app').style.display='block';
            sync();
        };

        window.openTab = (t) => {
            ['feed-view', 'games-view', 'you-view'].forEach(v => document.getElementById(v).style.display='none');
            document.getElementById(t+'-view').style.display='block';
        };
        window.openPost = () => document.getElementById('composer').style.display='flex';
        window.closePost = () => document.getElementById('composer').style.display='none';
        window.tapGame = () => { window.xp++; document.getElementById('xp-display').innerText = window.xp; };

        window.publish = async () => {
            const btn = document.getElementById('pub-btn'); btn.innerText = "⏳";
            const file = document.getElementById('f-in').files[0];
            let url = ""; let type = "";
            if(file) {
                const sRef = ref(storage, `uploads/${Date.now()}`);
                await uploadBytes(sRef, file);
                url = await getDownloadURL(sRef);
                type = file.type.split('/')[0];
            }
            await addDoc(collection(db, "posts"), {
                user: window.myName, emoji: window.selectedEmoji, text: document.getElementById('p-text').value,
                media: url, mediaType: type, time: serverTimestamp()
            });
            window.closePost(); btn.innerText = "Done";
        };

        function sync() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(q, (snap) => {
                const f = document.getElementById('feed-view'); const mf = document.getElementById('my-feed');
                f.innerHTML = ""; mf.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    let mH = p.mediaType === 'image' ? `<img src="${p.media}" class="post-media">` : (p.mediaType === 'video' ? `<video src="${p.media}" controls class="post-media"></video>` : "");
                    const card = `<div class="card"><div class="user-avatar">${p.emoji}</div><div><b>@${p.user}</b><p>${p.text}</p>${mH}</div></div>`;
                    f.innerHTML += card;
                    if(p.user === window.myName) mf.innerHTML += card;
                });
            });
        }
    </script>
</body>
</html>
