<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pigeon Ultra Pro - Live</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --yt-black: #0f0f0f; --yt-border: #272727; --pigeon: #1DA1F2; --text: #ffffff; --gray: #aaaaaa; --wa-bg: #0b141a; --wa-sent: #005c4b; --wa-recv: #202c33; }
        * { box-sizing: border-box; font-family: "Roboto", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--yt-black); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- AUTH SYSTEM --- */
        .auth-input { padding:12px; width:260px; border-radius:8px; border:1px solid #333; margin-bottom:10px; background:#111; color:white; outline:none; }
        #recovery-display { display:none; background:#1a1a1a; padding:15px; border-radius:10px; margin-bottom:15px; border:1px dashed var(--pigeon); font-size:12px; width:260px; word-break:break-all; }

        /* --- DRAWER --- */
        #friends-drawer { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #111; z-index: 10001; transition: 0.3s; padding: 20px; border-right: 1px solid #333; overflow-y:auto;}
        #drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: none; }
        #drawer-search { width:100%; padding:10px; margin-bottom:15px; background:#222; color:white; border:1px solid #444; border-radius:8px; outline:none; }
        .list-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #222; cursor:pointer; }

        /* --- YT BOTTOM BAR --- */
        nav { height: 50px; border-top: 1px solid var(--yt-border); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; background: #000; z-index: 1000; }
        .nav-item { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; font-size: 18px; flex: 1; opacity: 0.9; cursor: pointer; }
        .nav-text { font-size: 10px; margin-top: 3px; }
        .plus-btn { font-size: 32px; }

        /* --- CARDS & MEDIA --- */
        #app { margin-top: 56px; margin-bottom: 50px; height: calc(100vh - 106px); overflow-y: auto; }
        header { height: 56px; border-bottom: 1px solid var(--yt-border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: fixed; top: 0; width: 100%; background: #000; z-index: 1000; }
        .card { padding: 15px; border-bottom: 8px solid var(--yt-border); }
        .card-media { width: 100%; border-radius: 10px; margin-top: 10px; border:1px solid #333; }
        .action-bar { display: flex; gap: 20px; margin-top: 15px; color: var(--gray); font-size: 13px; cursor: pointer; }
        .btn-small { background:#222; color:white; border:1px solid #444; padding:3px 8px; border-radius:12px; font-size:11px; cursor:pointer; }
        .poll-opt { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #333; position: relative; overflow: hidden; display: flex; justify-content: space-between; cursor: pointer; }
        .poll-fill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(29, 161, 242, 0.2); transition: 0.4s ease; pointer-events: none; }
        .mini-avatar { background:#222; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        
        /* --- STUDIO UPDATES --- */
        .studio-toolbar { display: flex; align-items: center; justify-content: space-around; background: #1a1a1a; padding: 10px; border-radius: 25px; margin-top: 20px; }
        .studio-icon { font-size: 24px; cursor: pointer; padding: 5px 20px; }
        .poll-input-wrapper { position: relative; margin-bottom: 10px; }
        .poll-input-wrapper .auth-input { width: 100%; padding-right: 40px; }
        .poll-remove { position: absolute; right: 10px; top: 12px; color: #ff4444; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* --- TALK CHAMBER (WHATSAPP CLONE) --- */
        #talk-chamber { display: none; position: fixed; inset: 0; background: var(--wa-bg); z-index: 20000; flex-direction: column; }
        .chat-header { background: var(--wa-recv); padding: 10px 15px; display: flex; align-items: center; gap: 15px; }
        .chat-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg.sent { background: var(--wa-sent); align-self: flex-end; border-top-right-radius: 0; }
        .msg.recv { background: var(--wa-recv); align-self: flex-start; border-top-left-radius: 0; }
        .chat-input-area { background: var(--wa-recv); padding: 10px; display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; background: #2a3942; border: none; padding: 12px 15px; border-radius: 25px; color: white; outline: none; }
        .send-btn { background: #00a884; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body onload="initApp()">

    <div id="drawer-overlay" onclick="toggleDrawer(false)"></div>
    <div id="friends-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:var(--pigeon); margin:0;">Friends</h2>
            <span onclick="toggleDrawer(false)" style="font-size:24px; cursor:pointer; font-weight:bold;">✕</span>
        </div>
        <p style="font-size:12px; color:var(--gray);">Tap a friend to enter the Talk Chamber</p>
        <div id="drawer-list-container"></div>
    </div>

    <div id="id-gate" style="position:fixed; inset:0; background:#000; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 20px;">
        <h1 style="color:var(--pigeon); font-size:40px; margin:0;">🕊️</h1>
        <h2 style="font-size:18px; margin-bottom:20px;">Join Pigeon</h2>
        <input type="text" id="u-name" class="auth-input" placeholder="Handle (min 3 chars)">
        <p style="font-size:12px; color:var(--gray); margin:0 0 5px 0;">Pick your Avatar:</p>
        <div id="emoji-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; height:120px; width:260px; overflow-y:auto; margin-bottom:15px; background:#111; padding:10px; border-radius:10px;"></div>
        <button onclick="register()" style="background:var(--pigeon); color:white; border:none; padding:12px 60px; border-radius:25px; font-weight:bold; cursor:pointer;">ENTER</button>
    </div>

    <div id="main-ui" style="display:none">
        <header>
            <div onclick="toggleDrawer(true)" style="font-size:24px; cursor:pointer;">☰</div>
            <div style="font-weight:900; font-size:20px; color:var(--pigeon); letter-spacing:1px;">🕊️ PIGEON</div>
            <div style="font-size:18px;">🔔</div>
        </header>

        <main id="app"><div id="feed"></div></main>
        
        <nav>
            <div class="nav-item" onclick="switchTab('home')">🏠<span class="nav-text">Home</span></div>
            <div class="nav-item plus-btn" onclick="openStudio()" style="color:var(--pigeon);">⊕</div>
            <div class="nav-item" onclick="switchTab('you')">👤<span class="nav-text">You</span></div>
        </nav>
    </div>

    <div id="studio" style="position:fixed; inset:0; background:#000; z-index:9000; display:none; flex-direction:column; padding:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="closeStudio()" style="font-size:24px; cursor:pointer;">✕</span>
            <button onclick="postNow()" style="background:var(--pigeon); color:white; border:none; border-radius:20px; padding:8px 20px; font-weight:bold; cursor:pointer;">Post</button>
        </div>
        <textarea id="post-text" placeholder="What's happening?" style="width:100%; height:150px; background:none; border:none; color:white; font-size:22px; margin-top:20px; outline:none; resize:none;"></textarea>
        
        <div id="dynamic-poll-options" style="margin-top:10px; overflow-y:auto; max-height:200px;"></div>
        <div id="media-preview-container" style="display:none; margin-top:10px; border-radius:10px; overflow:hidden;"></div>
        <input type="file" id="media-upload" accept="image/*, video/*" hidden onchange="handleMedia(this)">

        <div style="margin-top:auto; padding-bottom:10px;">
            <div class="studio-toolbar">
                <span class="studio-icon" onclick="addPollOption()">📊</span>
                <div style="width:1px; height:24px; background:#333;"></div>
                <span class="studio-icon" onclick="document.getElementById('media-upload').click()">🖼️</span>
            </div>
        </div>
    </div>

    <div id="talk-chamber">
        <div class="chat-header">
            <span onclick="closeChat()" style="font-size:24px; cursor:pointer; font-weight:bold;">←</span>
            <div class="mini-avatar" id="chat-header-avatar" style="width:35px; height:35px; font-size:20px;"></div>
            <b id="chat-header-name" style="font-size:16px;"></b>
        </div>
        <div class="chat-area" id="chat-messages">
            </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input-box" class="chat-input" placeholder="Message" onkeydown="if(event.key==='Enter') sendChat()">
            <div class="send-btn" onclick="sendChat()">➤</div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE SETUP (Replace with your config for live data) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase if user put their config, otherwise use local array fallback
        let db;
        let useFirebase = false;
        if(firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            useFirebase = true;
        }

        // States
        let userHandle = "", userEmoji = "👤", isSubscribed = false;
        let allPosts = [], networkList = [], currentMedia = null, currentTab = 'home';
        let activeChatUser = null;

        function initApp() {
            populateEmojis();
            const savedUser = localStorage.getItem('pigeon_handle');
            if (savedUser) {
                userHandle = savedUser;
                userEmoji = localStorage.getItem('pigeon_emoji') || "👤";
                isSubscribed = localStorage.getItem('pigeon_sub') === 'true'; // Loads sub state (Problem 2 solved)
                if(localStorage.getItem('pigeon_network')) networkList = JSON.parse(localStorage.getItem('pigeon_network'));
                
                document.getElementById('id-gate').style.display = 'none'; // Gate gone permanently
                document.getElementById('main-ui').style.display = 'block';
                startFeed();
            }
        }

        function populateEmojis() {
            const grid = document.getElementById('emoji-grid');
            const arr = ["😎","🔥","🕊️","🐱","👤","🤖","🎮","🍕","💀","✨"];
            arr.forEach(e => {
                let s = document.createElement('span'); s.innerHTML = e; s.style.fontSize="24px"; s.style.cursor="pointer";
                s.onclick = function(){ Array.from(grid.children).forEach(c=>c.style.background='none'); this.style.background='var(--pigeon)'; userEmoji=this.innerHTML; };
                grid.appendChild(s);
            });
        }

        function register() {
            userHandle = document.getElementById('u-name').value.trim();
            if(userHandle.length < 3) return alert("Handle min 3 chars");
            localStorage.setItem('pigeon_handle', userHandle);
            localStorage.setItem('pigeon_emoji', userEmoji);
            localStorage.setItem('pigeon_sub', 'false');
            location.reload(); 
        }

        function unlockSubGate() {
            localStorage.setItem('pigeon_sub', 'true'); // Save sub state permanently
            isSubscribed = true;
            renderFeed(allPosts); // Re-render to clear the gate
        }

        function switchTab(tab) { currentTab = tab; renderFeed(allPosts); window.scrollTo(0,0); }

        // --- NETWORK & CHAT (Talk Chamber) ---
        function toggleDrawer(show) {
            document.getElementById('friends-drawer').style.left = show ? "0" : "-280px";
            document.getElementById('drawer-overlay').style.display = show ? "block" : "none";
            if(show) {
                const container = document.getElementById('drawer-list-container');
                if(networkList.length === 0) container.innerHTML = "<p style='color:var(--gray); font-size:13px;'>No friends yet. Add humans from the feed!</p>";
                else container.innerHTML = networkList.map(n => `
                    <div class="list-item" onclick="openChat('${n.handle}', '${n.emoji}')">
                        <div class="mini-avatar" style="width:35px; height:35px; font-size:18px;">${n.emoji}</div>
                        <b style="font-size:15px;">@${n.handle}</b>
                    </div>
                `).join('');
            }
        }

        function addNetwork(handle, emoji) {
            if(handle === userHandle) return;
            if(!networkList.find(n => n.handle === handle)) {
                networkList.push({ handle, emoji });
                localStorage.setItem('pigeon_network', JSON.stringify(networkList)); 
                alert(`Added ${handle} as a friend! Check drawer to chat.`);
            }
        }

        function openChat(handle, emoji) {
            activeChatUser = handle;
            document.getElementById('chat-header-name').innerText = "@" + handle;
            document.getElementById('chat-header-avatar').innerText = emoji;
            document.getElementById('talk-chamber').style.display = 'flex';
            toggleDrawer(false);
            loadChatMessages();
        }

        function closeChat() { document.getElementById('talk-chamber').style.display = 'none'; activeChatUser = null; }

        function loadChatMessages() {
            // Simulated local chat storage for instant WhatsApp feel
            const chatKey = 'chat_' + [userHandle, activeChatUser].sort().join('_');
            const msgs = JSON.parse(localStorage.getItem(chatKey) || '[]');
            const box = document.getElementById('chat-messages');
            box.innerHTML = msgs.map(m => `<div class="msg ${m.sender === userHandle ? 'sent' : 'recv'}">${m.text}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        function sendChat() {
            const input = document.getElementById('chat-input-box');
            if(!input.value.trim()) return;
            const chatKey = 'chat_' + [userHandle, activeChatUser].sort().join('_');
            const msgs = JSON.parse(localStorage.getItem(chatKey) || '[]');
            msgs.push({ sender: userHandle, text: input.value.trim(), time: Date.now() });
            localStorage.setItem(chatKey, JSON.stringify(msgs));
            input.value = "";
            loadChatMessages();
        }

        // --- STUDIO ---
        function openStudio() { document.getElementById('studio').style.display = 'flex'; }
        function closeStudio() { document.getElementById('studio').style.display = 'none'; }
        
        function handleMedia(input) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentMedia = e.target.result;
                const prevBox = document.getElementById('media-preview-container');
                prevBox.style.display = 'block';
                prevBox.innerHTML = `<img src="${currentMedia}" style="width:100%; max-height:200px; object-fit:cover;">`;
            };
            reader.readAsDataURL(file);
        }

        function addPollOption() {
            const container = document.getElementById('dynamic-poll-options');
            if (container.children.length >= 6) return alert("Max 6 options"); 
            let div = document.createElement('div');
            div.className = "poll-input-wrapper";
            div.innerHTML = `
                <input type="text" class="auth-input poll-opt-in" placeholder="Option ${container.children.length + 1}">
                <span class="poll-remove" onclick="this.parentElement.remove()">×</span>
            `;
            container.appendChild(div);
        }

        async function postNow() {
            const text = document.getElementById('post-text').value;
            const opts = Array.from(document.querySelectorAll('.poll-opt-in')).map(i => ({ text: i.value, votes: 0 })).filter(o => o.text);
            
            if(!text && !currentMedia && opts.length === 0) return alert("Cannot post empty!");

            const newPost = {
                user: userHandle, emoji: userEmoji, text: text,
                media: currentMedia, poll: opts.length > 0 ? opts : null,
                timestamp: Date.now()
            };

            if(useFirebase) {
                await db.collection("posts").add(newPost);
            } else {
                // Fallback local logic if Firebase isn't configured
                allPosts.unshift(newPost);
                renderFeed(allPosts);
            }

            // Reset
            document.getElementById('post-text').value = ""; 
            document.getElementById('dynamic-poll-options').innerHTML = "";
            currentMedia = null; document.getElementById('media-preview-container').style.display = 'none';
            switchTab('home'); closeStudio();
        }

        // --- FEED ---
        function startFeed() {
            if(useFirebase) {
                db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
                    allPosts = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    renderFeed(allPosts);
                });
            } else {
                renderFeed(allPosts);
            }
        }

        function renderFeed(posts) {
            let feedBox = document.getElementById('feed');
            let feedHTML = "";
            let postsToRender = currentTab === 'you' ? posts.filter(p => p.user === userHandle) : posts;

            if(currentTab === 'you') {
                feedHTML += `
                <div style="padding:30px 20px; text-align:center; border-bottom:8px solid #222; background:linear-gradient(180deg, #111, #000);">
                    <div style="font-size:50px; background:#222; border-radius:50%; width:90px; height:90px; margin:0 auto 10px auto; display:flex; align-items:center; justify-content:center;">${userEmoji}</div>
                    <h2 style="margin:0;">@${userHandle}</h2>
                </div>`;
            }

            if(postsToRender.length === 0) {
                feedHTML += `<p style='text-align:center; padding:40px 20px; color:var(--gray);'>No human posts yet. Hit the + to create one!</p>`;
            } else {
                // Ensure sub gate limits what they see if they haven't subscribed
                let displayCount = (!isSubscribed && currentTab === 'home') ? Math.min(2, postsToRender.length) : postsToRender.length;

                for(let i=0; i<displayCount; i++) {
                    let post = postsToRender[i];
                    feedHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="mini-avatar" style="width:35px; height:35px; font-size:20px;">${post.emoji}</div>
                                <b>@${post.user}</b>
                            </div>
                            ${post.user !== userHandle ? `<button class="btn-small" onclick="addNetwork('${post.user}', '${post.emoji}')">+ Add Friend</button>` : ''}
                        </div>
                        <p style="margin:5px 0 10px 0;">${post.text}</p>
                        ${post.media ? `<img src="${post.media}" class="card-media">` : ''}
                        
                        ${post.poll ? `
                        <div class="poll-v">
                            ${post.poll.map((opt, idx) => `
                                <div class="poll-opt">
                                    <span style="position:relative">○ ${opt.text}</span>
                                    <span style="position:relative">${opt.votes || 0} votes</span>
                                </div>
                            `).join('')}
                        </div>` : ''}
                    </div>`;
                }

                // Append Sub Gate if not subscribed and more posts exist (Problem 1 & 2 solved)
                if(!isSubscribed && currentTab === 'home' && postsToRender.length > 2) {
                    feedHTML += `
                    <div class="card" style="background:linear-gradient(45deg, #1a1a1a, #000); text-align:center; border-bottom: 8px solid var(--pigeon);">
                        <h3 style="color:var(--pigeon); margin-top:0;">🔒 Timeline Locked</h3>
                        <p style="font-size:13px; color:var(--gray);">Subscribe completely free to unlock the rest of the human posts!</p>
                        <button onclick="unlockSubGate()" style="background:var(--pigeon); color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer; margin:5px;">Unlock Feed</button>
                    </div>`;
                }
            }
            feedBox.innerHTML = feedHTML;
        }
    </script>
</body>
</html>
