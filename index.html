<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pigeon Ultra Pro</title>
    <style>
        :root { --yt-black: #0f0f0f; --yt-border: #272727; --pigeon: #1DA1F2; --text: #ffffff; --gray: #aaaaaa; }
        * { box-sizing: border-box; font-family: "Roboto", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--yt-black); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- DRAWER --- */
        #friends-drawer { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #111; z-index: 10001; transition: 0.3s; border-right: 1px solid var(--yt-border); padding: 20px; }
        #drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: none; }
        .friend-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid #222; }

        /* --- SUB GATE --- */
        .sub-gate-card { background: linear-gradient(45deg, #1a1a1a, #000); padding: 30px 20px; border-bottom: 8px solid var(--pigeon); text-align: center; }
        .sub-btn { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; margin: 5px; cursor: pointer; }

        /* --- UI --- */
        #app { margin-top: 56px; margin-bottom: 50px; height: calc(100vh - 106px); overflow-y: auto; }
        header { height: 56px; border-bottom: 1px solid var(--yt-border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: fixed; top: 0; width: 100%; background: #000; z-index: 1000; }
        nav { height: 50px; border-top: 1px solid var(--yt-border); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; background: #000; z-index: 1000; }
        .card { padding: 15px; border-bottom: 8px solid var(--yt-border); }
        .card-media { width: 100%; border-radius: 12px; margin-top: 10px; display: block; }
        
        /* --- POLLS --- */
        .poll-opt { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #333; position: relative; overflow: hidden; display: flex; justify-content: space-between; }
        .poll-fill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(29, 161, 242, 0.2); transition: 0.5s; pointer-events: none; }

        #studio { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        #game-overlay { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.9); z-index: 20000; }
        #game-pigeon { position: absolute; font-size: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="drawer-overlay" onclick="toggleDrawer(false)"></div>
    <div id="friends-drawer">
        <h2 style="color:var(--pigeon)">Friends Chat</h2>
        <div class="friend-item"><span>🦉</span> <b>NightOwl</b></div>
        <div class="friend-item"><span>🦊</span> <b>DevFox</b></div>
        <button onclick="toggleDrawer(false)" style="margin-top:20px; width:100%; padding:10px; background:#333; color:white; border:none; border-radius:8px;">Back</button>
    </div>

    <div id="id-gate" style="position:fixed; inset:0; background:#000; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 20px;">
        <h1 style="color:var(--pigeon); font-size:40px;">🕊️</h1>
        <input type="text" id="u-name" placeholder="Handle (5-10)" style="padding:12px; width:260px; border-radius:8px; border:none; margin-bottom:10px;">
        <div id="emoji-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; height:150px; width:280px; overflow-y:auto; margin-bottom:20px; background:#111; padding:10px; border-radius:10px;"></div>
        <button onclick="enterApp()" style="background:var(--pigeon); color:white; border:none; padding:12px 60px; border-radius:25px; font-weight:bold;">ENTER</button>
    </div>

    <div id="main-ui" style="display:none">
        <header>
            <div onclick="toggleDrawer(true)" style="font-size:24px;">☰</div>
            <div onclick="startEasterEgg()" style="font-weight:900; font-size:22px; color:var(--pigeon);">🕊️ Pigeon</div>
            <div style="font-size:20px;">🔍 🔔</div>
        </header>
        <main id="app"><div id="feed"></div></main>
        <nav>
            <button onclick="tab('home')" style="background:none; border:none; color:white;">🏠</button>
            <button onclick="openStudio()" style="font-size:30px; color:var(--pigeon); background:none; border:none;">+</button>
            <button style="background:none; border:none; color:white;">👤</button>
        </nav>
    </div>

    <div id="game-overlay">
        <div style="padding:20px; text-align:center;"><p>Score: <span id="score">0</span> | <span onclick="stopGame()">Exit</span></p></div>
        <div id="game-pigeon">🕊️</div>
    </div>

    <div id="studio">
        <div style="display:flex; justify-content:space-between; align-items:center;"><span onclick="closeStudio()" style="font-size:28px;">✕</span><button onclick="postNow()" style="background:white; border-radius:20px; padding:8px 20px; border:none; font-weight:bold;">Post</button></div>
        <textarea id="post-text" placeholder="What's happening?" style="width:100%; height:100px; background:none; border:none; color:white; font-size:18px; margin-top:10px; outline:none;"></textarea>
        <div id="poll-builder" style="display:none; margin-top:10px;">
            <div id="poll-options-container">
                <input type="text" class="poll-input poll-opt-val" placeholder="Option 1">
                <input type="text" class="poll-input poll-opt-val" placeholder="Option 2">
            </div>
            <button onclick="addPollOption()" style="color:var(--pigeon); background:none; border:none;">+ Add Option</button>
        </div>
        <div style="margin-top:auto; display:flex; gap:10px; padding:20px 0;">
            <button onclick="togglePoll(true)" style="flex:1; padding:10px; border-radius:10px; background:#222; color:white; border:none;">📊 Poll</button>
            <button onclick="document.getElementById('img-input').click()" style="flex:1; padding:10px; border-radius:10px; background:#222; color:white; border:none;">🖼️ Media</button>
        </div>
        <input type="file" id="img-input" accept="image/*" hidden onchange="handleFile(this)">
    </div>

    <script>
        let userHandle = "", userEmoji = "👤", allPosts = [], currentMedia = null, score = 0;

        // 1000 Emoji Picker
        const grid = document.getElementById('emoji-grid');
        for(let i=128512; i<129512; i++){
            let s = document.createElement('span'); s.innerHTML = `&#${i};`;
            s.onclick = function(){ Array.from(grid.children).forEach(c=>c.style.background='none'); this.style.background='var(--pigeon)'; userEmoji=this.innerHTML; };
            grid.appendChild(s);
        }

        function enterApp() {
            userHandle = document.getElementById('u-name').value;
            if(userHandle.length < 5) return alert("Min 5 chars");
            document.getElementById('id-gate').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        }

        function toggleDrawer(s) { document.getElementById('friends-drawer').style.left = s ? "0" : "-280px"; document.getElementById('drawer-overlay').style.display = s ? "block" : "none"; }
        function openStudio() { document.getElementById('studio').style.display = 'flex'; }
        function closeStudio() { document.getElementById('studio').style.display = 'none'; }
        function togglePoll(s) { document.getElementById('poll-builder').style.display = s ? 'block' : 'none'; }
        function addPollOption() { 
            const c = document.getElementById('poll-options-container');
            if(c.children.length < 10) { const i = document.createElement('input'); i.className='poll-input poll-opt-val'; i.placeholder=`Option ${c.children.length+1}`; c.appendChild(i); }
        }

        function handleFile(input) {
            const r = new FileReader();
            r.onload = (e) => { currentMedia = { type:'image', src: e.target.result }; alert("Photo Loaded!"); };
            r.readAsDataURL(input.files[0]);
        }

        function postNow() {
            let poll = null;
            if(document.getElementById('poll-builder').style.display === 'block') {
                poll = Array.from(document.querySelectorAll('.poll-opt-val')).map(i => ({ text: i.value, votes: 0, voters: [] })).filter(p => p.text);
            }
            allPosts.unshift({ id: Date.now(), user: userHandle, emoji: userEmoji, text: document.getElementById('post-text').value, media: currentMedia, poll });
            renderFeed(); closeStudio(); currentMedia = null;
        }

        function renderFeed() {
            let html = "";
            allPosts.forEach((post, index) => {
                html += `
                <div class="card">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                        <div style="width:30px; height:30px; border-radius:50%; background:#222; display:flex; align-items:center; justify-content:center;">${post.emoji}</div>
                        <b>@${post.user}</b>
                    </div>
                    <p>${post.text}</p>
                    ${post.media ? `<img src="${post.media.src}" class="card-media">` : ''}
                    ${post.poll ? `<div class="poll-v">${post.poll.map((o, i) => `<div class="poll-opt" onclick="castVote(${post.id}, ${i})"><div class="poll-fill" style="width:${o.votes*20}%"></div><span>${o.voters.includes(userHandle)?'●':'○'} ${o.text}</span></div>`).join('')}<button onclick="viewVotes(${post.id})" style="background:none; border:none; color:var(--pigeon); font-size:11px;">view votes</button></div>` : ''}
                </div>`;
                
                // --- SUB GATE INSERTION ---
                if((index + 1) % 3 === 0) {
                    html += `<div class="sub-gate-card">
                        <h3 style="margin:0; color:var(--pigeon)">🕊️ Sub Gate</h3>
                        <p style="font-size:13px; color:var(--gray)">Subscribe to see more from your friends!</p>
                        <button class="sub-btn" style="background:var(--pigeon); color:white" onclick="alert('Subscribed!')">Subscribe Free</button>
                        <button class="sub-btn" style="background:gold; color:black" onclick="alert('Ultra Active!')">Go Ultra</button>
                    </div>`;
                }
            });
            document.getElementById('feed').innerHTML = html;
        }

        function castVote(pid, idx) { 
            const p = allPosts.find(x=>x.id===pid); 
            if(!p.poll[idx].voters.includes(userHandle)) {
                p.poll[idx].votes++; p.poll[idx].voters.push(userHandle); renderFeed(); 
            }
        }

        function viewVotes(pid) {
            const p = allPosts.find(x=>x.id===pid);
            let str = p.poll.map(o => `${o.text}: ${o.voters.join(', ') || 'No votes'}`).join('\n');
            alert("Voters List:\n" + str);
        }

        function startEasterEgg() { document.getElementById('game-overlay').style.display = 'block'; movePigeon(); }
        function stopGame() { document.getElementById('game-overlay').style.display = 'none'; }
        document.getElementById('game-pigeon').onclick = () => { score++; document.getElementById('score').innerText = score; movePigeon(); };
        function movePigeon() { const p = document.getElementById('game-pigeon'); p.style.left = Math.random()*80+"vw"; p.style.top = Math.random()*80+"vh"; }
        function tab(t) { renderFeed(); }
    </script>
</body>
</html>
