<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon | Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .auth-screen { position: fixed; inset: 0; z-index: 5000; display: flex; items: center; justify-content: center; background: #075e54; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        #sidebarMenu { transform: translateX(-100%); transition: 0.3s; position: fixed; top: 0; left: 0; height: 100%; width: 280px; background: #121212; z-index: 1000; border-right: 1px solid #333; }
        #sidebarMenu.active { transform: translateX(0); }
        .logo-text { background: linear-gradient(to right, #25d366, #1da1f2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    </style>
</head>
<body class="pb-20">

    <div id="loginStep" class="auth-screen">
        <div class="bg-white p-10 rounded-3xl text-black w-96 text-center shadow-2xl">
            <div class="text-6xl mb-4">🕊️</div>
            <h1 class="text-3xl font-black mb-2">Pigeon</h1>
            <p class="text-gray-500 mb-8 font-medium">Sign in with Google to continue</p>
            
            <div id="g_id_onload" data-client_id="YOUR_ID" data-callback="onSignIn"></div>
            <div class="g_id_signin" data-type="standard"></div>

            <button onclick="onSignIn()" class="mt-6 w-full border-2 border-gray-200 py-2 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-gray-50">
               <img src="https://www.google.com/favicon.ico" class="w-4"> Simulate Google Login
            </button>
        </div>
    </div>

    <div id="subStep" class="auth-screen hidden !bg-[#111]">
        <div class="bg-white p-10 rounded-3xl text-black w-96 text-center border-b-8 border-yellow-500 shadow-2xl">
            <h2 class="text-3xl font-black mb-4 uppercase">One More Step!</h2>
            <p class="text-lg mb-8 text-gray-600">You must <b>Subscribe</b> to my channel to unlock the Pigeon App.</p>
            
            <a href="https://www.youtube.com/@YOUR_CHANNEL_HERE?sub_confirmation=1" 
               target="_blank" 
               onclick="showEnterButton()"
               class="block w-full bg-red-600 text-white font-black py-4 rounded-2xl text-xl shadow-xl hover:bg-red-700 transition mb-4">
                SUBSCRIBE TO UNLOCK
            </a>

            <button id="finalEnter" onclick="unlockApp()" class="hidden w-full bg-[#075e54] text-white font-bold py-3 rounded-xl uppercase animate-bounce">
                I Subscribed! Enter Site
            </button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="fixed top-0 w-full bg-[#050505] p-4 flex justify-between items-center border-b border-gray-900 z-50">
            <div class="flex items-center space-x-4">
                <i class="fa-solid fa-bars text-xl cursor-pointer" onclick="toggleMenu()"></i>
                <div class="flex items-center space-x-2 cursor-pointer" onclick="openGame()">
                    <span class="text-2xl">🕊️</span>
                    <span class="logo-text text-2xl uppercase tracking-tighter">Pigeon</span>
                </div>
            </div>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center font-bold">U</div>
        </header>

        <main id="feed" class="max-w-xl mx-auto pt-24 px-4 space-y-6">
            <div class="bg-[#121212] rounded-2xl border border-gray-800 p-8 text-center">
                <p class="text-gray-400 text-lg">Your Pigeon feed is empty. Be the first to post!</p>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full bg-[#050505] border-t border-gray-900 flex justify-around items-center py-4 z-50">
            <i class="fa-solid fa-house text-xl"></i>
            <div class="bg-white w-14 h-14 rounded-full flex items-center justify-center -mt-10 shadow-2xl cursor-pointer" onclick="openPostModal()">
                <i class="fa-solid fa-plus text-black text-3xl"></i>
            </div>
            <i class="fa-solid fa-user text-xl text-gray-600"></i>
        </nav>
    </div>

    <div id="postModal" class="modal">
        <div class="bg-[#181818] w-full max-w-lg p-6 rounded-3xl border border-gray-700">
            <h2 class="text-xl font-bold mb-4 text-green-500">New Post</h2>
            <textarea id="postInput" placeholder="Type your text here..." class="bg-transparent w-full h-40 text-2xl outline-none border-none resize-none"></textarea>
            <div class="flex justify-end pt-4 border-t border-gray-800">
                <button onclick="sendPost()" class="bg-[#25d366] text-black font-black px-10 py-2 rounded-full uppercase">Post Now</button>
            </div>
        </div>
    </div>

    <div id="gameScreen" class="modal">
        <canvas id="gameCanvas" width="320" height="400" class="border-4 border-white rounded-xl"></canvas>
        <button onclick="closeGame()" class="mt-8 bg-red-600 px-10 py-2 rounded-full font-black">QUIT</button>
    </div>

    <script>
        // 1. SIGN IN FLOW
        function onSignIn() {
            document.getElementById('loginStep').classList.add('hidden');
            document.getElementById('subStep').classList.remove('hidden');
        }

        // 2. SUB FLOW
        function showEnterButton() {
            // Shows the "Enter" button after they click the sub link
            setTimeout(() => {
                document.getElementById('finalEnter').classList.remove('hidden');
            }, 2000);
        }

        function unlockApp() {
            document.getElementById('subStep').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.body.style.overflow = "auto";
        }

        // 3. POSTING ENGINE
        function openPostModal() { document.getElementById('postModal').style.display = 'flex'; }
        function sendPost() {
            const text = document.getElementById('postInput').value;
            if(!text) return;
            const card = document.createElement('div');
            card.className = "bg-[#121212] border border-gray-800 p-6 rounded-2xl mb-4";
            card.innerHTML = `<p class="text-xl mb-4">${text}</p><div class="flex gap-6 text-gray-500"><i class="fa-solid fa-thumbs-up hover:text-green-400 cursor-pointer"></i><i class="fa-solid fa-share hover:text-blue-400 cursor-pointer"></i></div>`;
            document.getElementById('feed').prepend(card);
            document.getElementById('postInput').value = "";
            document.getElementById('postModal').style.display = 'none';
        }

        // 4. GAME ENGINE
        const cvs = document.getElementById('gameCanvas'), ctx = cvs.getContext('2d');
        let b = {y:200, v:0}, pipes = [], active = false, anim;
        function openGame() { document.getElementById('gameScreen').style.display = 'flex'; active=true; b.y=200; b.v=0; pipes=[]; loop(); }
        function closeGame() { document.getElementById('gameScreen').style.display = 'none'; active=false; cancelAnimationFrame(anim); }
        function loop() {
            if(!active) return;
            ctx.fillStyle = "#4ec0ca"; ctx.fillRect(0,0,320,400);
            b.v += 0.4; b.y += b.v;
            ctx.font = "30px Arial"; ctx.fillText("🕊️", 50, b.y);
            if(pipes.length==0 || pipes[pipes.length-1].x < 150) pipes.push({x:320, h:Math.random()*150+50});
            pipes.forEach(p => { 
                p.x -= 3; ctx.fillStyle = "green"; ctx.fillRect(p.x, 0, 40, p.h); ctx.fillRect(p.x, p.h+100, 40, 400);
                if(50+20 > p.x && 50 < p.x+40 && (b.y-20 < p.h || b.y > p.h+80)) active = false;
            });
            pipes = pipes.filter(p => p.x > -50);
            if(b.y > 400 || b.y < 0) active = false;
            anim = requestAnimationFrame(loop);
        }
        window.onkeydown = (e) => { if(e.code=='Space') b.v=-7; };
        cvs.onmousedown = () => { b.v=-7; };
    </script>
</body>
</html>
