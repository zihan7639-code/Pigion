<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pigeon Ultra | Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <style>
        :root { --pigeon: #1DA1F2; --dark: #000000; --gray: #16181c; --border: #2f3336; --text: #f7f9f9; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; }

        /* AUTH & BARS (Keeping your previous styles) */
        .overlay { position: fixed; inset: 0; background: white; color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9000; padding: 20px; text-align: center; }
        .black-bg { background: var(--dark) !important; color: white !important; display: none; }
        header { height: 50px; background: var(--dark); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        nav { height: 65px; background: var(--dark); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        
        /* MEDIA STYLES */
        .post-media { width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid var(--border); }
        .poll-box { background: var(--gray); border-radius: 12px; padding: 10px; margin-top: 10px; }
        .poll-opt { background: #333; padding: 8px; margin: 5px 0; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; }
        
        /* COMPOSER TOOLBOX */
        #composer { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: none; flex-direction: column; padding: 20px; }
        .tool-box { display: flex; flex-wrap: wrap; gap: 10px; margin-top: auto; padding-bottom: 20px; }
        .tool-btn { background: var(--gray); border: none; color: white; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 8px; font-size: 12px; cursor: pointer; }
        .gray-add { width: 30px; height: 30px; background: #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        
        #app { display: none; margin-top: 50px; margin-bottom: 65px; height: calc(100vh - 115px); overflow-y: auto; }
        .card { padding: 15px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="sub-choice" class="overlay">
        <h1>🕊️ Pigeon Ultra</h1>
        <button onclick="goSub()" style="padding:15px; background:var(--pigeon); color:white; border-radius:25px; border:none; width:250px;">1. Subscribe to Ultra</button>
        <button onclick="goVerify()" style="margin-top:10px; padding:15px; border-radius:25px; width:250px;">2. I have subscribed</button>
    </div>
    <div id="verify-screen" class="overlay black-bg"><h3>Verifying...</h3></div>
    <div id="gate" class="overlay" style="display:none">
        <h2>Setup Identity</h2>
        <input type="text" id="username" placeholder="Name (5-10)" maxlength="10" style="padding:10px; margin:5px;">
        <button onclick="finalize()" style="padding:10px 30px; background:black; color:white; border-radius:20px;">Done</button>
    </div>

    <div id="main-ui" style="display:none">
        <header><span>☰</span><b>🕊️ PIGEON</b><span id="top-avatar">👤</span></header>
        <main id="app"><div id="feed"></div></main>

        <div id="composer">
            <div style="display:flex; justify-content:space-between;">
                <span onclick="closePost()" style="font-size:24px">✕</span>
                <button onclick="publish()" id="publish-btn" style="background:var(--pigeon); color:white; border:none; padding:8px 20px; border-radius:20px;">Done</button>
            </div>
            <textarea id="p-text" placeholder="What's happening?" style="width:100%; height:150px; background:none; border:none; color:white; font-size:18px; outline:none; margin-top:15px;"></textarea>
            
            <div id="preview" style="color:var(--pigeon); font-size:12px; margin-bottom:10px;"></div>

            <div class="tool-box">
                <input type="file" id="img-input" hidden accept="image/*" onchange="previewFile('Image')">
                <div class="tool-btn" onclick="document.getElementById('img-input').click()"><div class="gray-add">+</div> Image</div>
                
                <input type="file" id="vid-input" hidden accept="video/*" onchange="previewFile('Video')">
                <div class="tool-btn" onclick="document.getElementById('vid-input').click()"><div class="gray-add">+</div> Video</div>
                
                <div class="tool-btn" onclick="startVoice()"><div class="gray-add">+</div> Voice</div>
                <div class="tool-btn" onclick="addPoll()">📊 Voting Poll</div>
            </div>
        </div>

        <nav>
            <button onclick="openTab('home')" style="color:white; background:none; border:none;">🏠</button>
            <button onclick="openPost()" style="font-size:30px; color:white; background:none; border:none;">⊕</button>
            <button onclick="openTab('you')" style="color:white; background:none; border:none;">👤</button>
        </nav>
    </div>

    <script>
        // CONFIG (Use your keys)
        const firebaseConfig = {
            apiKey: "AIzaSyDCrAjMOIh0yD9Vp6Zdp8M",
            authDomain: "pigeon-platform.firebaseapp.com",
            projectId: "pigeon-platform",
            storageBucket: "pigeon-platform.firebasestorage.app",
            messagingSenderId: "322112493288",
            appId: "1:322112493288:web:f6e5ed8e0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let myName = "";
        let subReady = false;
        let selectedFile = null;
        let pollData = null;

        // AUTH GATES
        function goSub() { window.open("https://youtube.com/@Ultra-wk8ed"); subReady = true; }
        function goVerify() {
            if(!subReady) return alert("Sub first!");
            document.getElementById('sub-choice').style.display='none';
            document.getElementById('verify-screen').style.display='flex';
            setTimeout(() => { document.getElementById('verify-screen').style.display='none'; document.getElementById('gate').style.display='flex'; }, 3000);
        }
        function finalize() {
            myName = document.getElementById('username').value;
            if(myName.length < 5) return alert("Too short!");
            document.getElementById('gate').style.display='none';
            document.getElementById('main-ui').style.display='block';
            document.getElementById('app').style.display='block';
            sync();
        }

        // POSTING LOGIC
        function openPost() { document.getElementById('composer').style.display='flex'; }
        function closePost() { document.getElementById('composer').style.display='none'; selectedFile = null; pollData = null; }

        function previewFile(type) {
            const input = type === 'Image' ? 'img-input' : 'vid-input';
            selectedFile = document.getElementById(input).files[0];
            document.getElementById('preview').innerText = "📎 Attachment: " + type + " added";
        }

        function addPoll() {
            const q = prompt("Enter Poll Question:");
            if(q) {
                pollData = { question: q, options: ["Yes", "No"], votes: [0, 0] };
                document.getElementById('preview').innerText = "📊 Poll: " + q;
            }
        }

        async function publish() {
            const btn = document.getElementById('publish-btn');
            btn.innerText = "Uploading...";
            btn.disabled = true;

            let fileUrl = "";
            let fileType = "";

            if(selectedFile) {
                const ref = storage.ref(`uploads/${Date.now()}_${selectedFile.name}`);
                await ref.put(selectedFile);
                fileUrl = await ref.getDownloadURL();
                fileType = selectedFile.type.split('/')[0]; // 'image' or 'video'
            }

            await db.collection("posts").add({
                user: myName,
                text: document.getElementById('p-text').value,
                media: fileUrl,
                mediaType: fileType,
                poll: pollData,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });

            btn.innerText = "Done";
            btn.disabled = false;
            closePost();
        }

        function sync() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                const f = document.getElementById('feed'); f.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    let mediaHtml = "";
                    if(p.mediaType === 'image') mediaHtml = `<img src="${p.media}" class="post-media">`;
                    if(p.mediaType === 'video') mediaHtml = `<video src="${p.media}" controls class="post-media"></video>`;
                    
                    let pollHtml = "";
                    if(p.poll) {
                        pollHtml = `<div class="poll-box"><b>${p.poll.question}</b>`;
                        p.poll.options.forEach(opt => pollHtml += `<div class="poll-opt">${opt}</div>`);
                        pollHtml += `</div>`;
                    }

                    f.innerHTML += `
                        <div class="card">
                            <b style="color:var(--pigeon)">@${p.user}</b>
                            <p>${p.text}</p>
                            ${mediaHtml}
                            ${pollHtml}
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
