<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigeon Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
        #sidebarMenu { transform: translateX(-100%); transition: 0.3s ease-in-out; position: fixed; top: 0; left: 0; height: 100%; width: 250px; background: #121212; z-index: 1000; border-right: 1px solid #333; }
        #sidebarMenu.active { transform: translateX(0); }
        .auth-screen { position: fixed; inset: 0; z-index: 5000; display: flex; items: center; justify-content: center; background: #075e54; }
        .hidden { display: none !important; }
        .btn-green { background: #25d366; color: black; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; }
        .liked { color: #25d366 !important; }
        .disliked { color: #ff4b4b !important; }
        .friended { color: #3b82f6 !important; }
    </style>
</head>
<body class="pb-24">

    <div id="loginStep" class="auth-screen">
        <div class="bg-white p-8 rounded-2xl text-black w-80 text-center">
            <i class="fa-solid fa-pigeon text-5xl text-[#075e54] mb-4"></i>
            <h2 class="text-2xl font-bold mb-6">Pigeon Sign In</h2>
            <input type="text" id="userInput" placeholder="Username" class="border-2 border-gray-200 p-2 w-full mb-4 rounded-lg text-black outline-none focus:border-green-500">
            <button onclick="toSub()" class="btn-green uppercase">Sign In</button>
        </div>
    </div>

    <div id="subStep" class="auth-screen hidden">
        <div class="bg-white p-8 rounded-2xl text-black w-80 text-center border-4 border-yellow-500">
            <h2 class="text-3xl font-black mb-2 italic text-yellow-600">PREMIUM</h2>
            <p class="mb-8 text-gray-600">Subscribe to unlock the Pigeon feed and post your videos.</p>
            <button onclick="startApp()" class="btn-green uppercase">Subscribe & Enter</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div id="sidebarMenu" class="p-6">
            <div class="flex justify-between items-center mb-10">
                <span class="font-bold text-2xl">Pigeon</span>
                <button onclick="toggleMenu()"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <nav class="flex flex-col space-y-6 text-lg">
                <a href="#" class="flex items-center"><i class="fa-solid fa-house mr-4"></i> Home</a>
                <a href="#" class="flex items-center"><i class="fa-solid fa-user-group mr-4"></i> Friends</a>
                <a href="#" class="flex items-center"><i class="fa-solid fa-bolt mr-4 text-yellow-500"></i> Shorts</a>
                <a href="#" class="flex items-center"><i class="fa-solid fa-rss mr-4"></i> Following</a>
                <a href="#" class="flex items-center"><i class="fa-solid fa-user mr-4"></i> You</a>
            </nav>
        </div>

        <header class="fixed top-0 w-full bg-[#0f0f0f] p-4 flex justify-between items-center border-b border-gray-800 z-50">
            <div class="flex items-center space-x-4">
                <button onclick="toggleMenu()"><i class="fa-solid fa-bars text-xl"></i></button>
                <div class="flex items-center space-x-2">
                    <i class="fa-solid fa-pigeon text-2xl"></i>
                    <span class="font-black text-xl uppercase tracking-tighter">Pigeon</span>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <div class="text-right hidden sm:block">
                    <p id="nameTag" class="text-xs font-bold text-gray-400">@User</p>
                    <p class="text-[10px] text-green-500 font-bold uppercase">Subscriber</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold">P</div>
            </div>
        </header>

        <main class="max-w-xl mx-auto pt-24 px-4">
            <div class="bg-[#1e1e1e] p-4 rounded-xl mb-8 border border-gray-800">
                <textarea id="postText" placeholder="What's happening?" class="bg-transparent w-full outline-none text-lg mb-4 h-12"></textarea>
                <div class="flex justify-between items-center pt-3 border-t border-gray-800">
                    <div class="flex space-x-5 text-gray-400 text-lg">
                        <i class="fa-solid fa-image cursor-pointer hover:text-white"></i>
                        <i class="fa-solid fa-video cursor-pointer hover:text-white"></i>
                        <i class="fa-solid fa-square-poll-vertical cursor-pointer hover:text-white"></i>
                        <i class="fa-solid fa-microphone cursor-pointer hover:text-white"></i>
                    </div>
                    <button onclick="addPost()" class="bg-[#075e54] px-6 py-1 rounded-full font-bold hover:bg-green-700 transition">Post</button>
                </div>
            </div>

            <div id="pigeonFeed" class="space-y-6">
                </div>
        </main>

        <nav class="fixed bottom-0 w-full bg-[#0f0f0f] border-t border-gray-800 flex justify-around items-center py-3 z-50">
            <button class="flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[9px] mt-1">Home</span></button>
            <button class="flex flex-col items-center text-gray-500"><i class="fa-solid fa-bolt"></i><span class="text-[9px] mt-1">Shorts</span></button>
            <button class="text-4xl"><i class="fa-solid fa-circle-plus"></i></button>
            <button class="flex flex-col items-center text-gray-500"><i class="fa-solid fa-rss"></i><span class="text-[9px] mt-1">Following</span></button>
            <button class="flex flex-col items-center text-gray-500"><i class="fa-solid fa-user"></i><span class="text-[9px] mt-1">You</span></button>
        </nav>
    </div>

    <script>
        // STEP 1 to STEP 2
        function toSub() {
            const user = document.getElementById('userInput').value;
            if (user.trim() === "") {
                alert("Please enter a name first!");
                return;
            }
            document.getElementById('nameTag').innerText = "@" + user;
            document.getElementById('loginStep').classList.add('hidden');
            document.getElementById('subStep').classList.remove('hidden');
        }

        // STEP 2 to MAIN APP
        function startApp() {
            document.getElementById('subStep').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.body.style.overflow = "auto";
        }

        // SIDEBAR TOGGLE
        function toggleMenu() {
            const menu = document.getElementById('sidebarMenu');
            menu.classList.toggle('active');
        }

        // ADD NEW POST
        function addPost() {
            const content = document.getElementById('postText').value;
            if (content.trim() === "") return;

            const feed = document.getElementById('pigeonFeed');
            const postBox = document.createElement('div');
            postBox.className = "bg-[#1e1e1e] rounded-xl border border-gray-800 overflow-hidden";
            
            postBox.innerHTML = `
                <div class="p-4 flex justify-between items-center">
                    <div class="flex items-center space-x-2">
                        <div class="w-7 h-7 bg-gray-600 rounded-full"></div>
                        <span class="font-bold text-sm">Pigeon Member</span>
                    </div>
                    <button class="bg-red-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase">Subscribe</button>
                </div>
                <div class="px-4 pb-4 text-gray-200">${content}</div>
                <div class="p-4 flex justify-between text-gray-400 border-t border-gray-700 bg-black/20">
                    <div class="flex space-x-6">
                        <i class="fa-regular fa-thumbs-up cursor-pointer hover:text-white" onclick="this.classList.toggle('liked')"></i>
                        <i class="fa-regular fa-thumbs-down cursor-pointer hover:text-white" onclick="this.classList.toggle('disliked')"></i>
                        <i class="fa-solid fa-share cursor-pointer hover:text-white"></i>
                    </div>
                    <div class="flex space-x-6">
                        <i class="fa-regular fa-bookmark cursor-pointer hover:text-white"></i>
                        <i class="fa-solid fa-user-plus cursor-pointer hover:text-white" onclick="this.classList.toggle('friended')"></i>
                    </div>
                </div>
            `;
            
            feed.prepend(postBox);
            document.getElementById('postText').value = ""; // Clear input
        }
    </script>
</body>
</html>
