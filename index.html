<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pigeon Ultra | The Complete Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <style>
        :root { --pigeon: #1DA1F2; --dark: #000; --gray: #16181c; --border: #2f3336; --text: #f7f9f9; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- OVERLAYS --- */
        .overlay { position: fixed; inset: 0; background: white; color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; padding: 20px; text-align: center; }
        .black-bg { background: var(--dark) !important; color: white !important; display: none; }
        
        /* --- AVATAR PICKER --- */
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; background: #eee; padding: 10px; border-radius: 12px; margin: 15px 0; }
        .emoji-opt { font-size: 24px; cursor: pointer; padding: 5px; border-radius: 8px; border: 2px solid transparent; }
        .emoji-opt.selected { border-color: var(--pigeon); background: white; }

        /* --- UI COMPONENTS --- */
        header { height: 50px; background: var(--dark); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        nav { height: 65px; background: var(--dark); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .nav-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 1.5px solid var(--pigeon); }
        #app { display: none; margin-top: 50px; margin-bottom: 65px; height: calc(100vh - 115px); overflow-y: auto; }
        .card { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
        .post-media { width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid var(--border); }
        
        /* --- GAMES & POLLS --- */
        .game-card { background: var(--gray); border-radius: 20px; padding: 30px; margin: 20px; border: 2px solid var(--pigeon); text-align: center; }
        .poll-box { background: var(--gray); border-radius: 12px; padding: 12px; margin-top: 10px; border: 1px solid var(--border); }
        .poll-opt { background: #333; padding: 10px; margin: 6px 0; border-radius: 8px; text-align: center; }

        /* --- STUDIO --- */
        #composer { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: none; flex-direction: column; padding: 20px; }
        textarea { width: 100%; height: 160px; background: none; border: none; color: white; font-size: 18px; outline: none; margin-top: 20px; }
        .tool-btn { background: var(--gray); border: none; color: white; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 8px; font-size: 12px; margin: 5px; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="sub-choice" class="overlay">
        <h1 style="font-size: 50px;">🕊️</h1>
        <h2>Pigeon Ultra</h2>
        <button onclick="goSub()" style="padding:15px; background:var(--pigeon); color:white; border-radius:25px; border:none; width:260px; font-weight:bold;">1. Subscribe to Ultra</button>
        <button onclick="goVerify()" style="margin-top:10px; padding:15px; border-radius:25px; border:none; width:260px; background:#eee;">2. I have subscribed</button>
    </div>

    <div id="verify-screen" class="overlay black-bg">
        <div style="border:4px solid #333; border-top-color:#fff; width:40px; height:40px; border-radius:50%; animation:spin 1s linear infinite"></div>
        <h3>Verifying Ultra Status...</h3>
    </div>

    <div id="gate" class="overlay" style="display:none">
        <h3>Choose Your Identity</h3>
        <div class="emoji-grid" id="emoji-picker"></div>
        <input type="text" id="username" placeholder="Name (5-10 chars)" maxlength="10" style="padding:12px; border-radius:10px; border:1px solid #ccc; width:280px;">
        <input type="password" id="password" placeholder="Password (10-15 chars)" maxlength="15" style="padding:12px; border-radius:10px; border:1px solid #ccc; width:280px; margin-top:10px;">
        <button onclick="finalize()" style="margin-top:15px; padding:12px 40px; background:black; color:white; border-radius:25px; border:none; font-weight:bold;">Finalize Profile</button>
    </div>

    <div id="main-ui" style="display:none">
        <header>
            <span>☰</span><b style="color:var(--pigeon);">🕊️ PIGEON ULTRA</b>
            <div id="top-avatar" class="user-avatar" onclick="openTab('you')">👤</div>
        </header>
        
        <main id="app">
            <div id="feed-view"></div>
            
            <div id="games-view" style="display:none;">
                <div class="game-card">
                    <h2>🕊️ Pigeon Clicker</h2>
                    <div id="game-score" style="font-size:30px; font-weight:bold; color:var(--pigeon);">0 XP</div>
                    <button onclick="tapGame()" style="font-size:80px; background:none; border:none; cursor:pointer;">🕊️</button>
                    <p>Tap to level up your Profile!</p>
                </div>
            </div>

            <div id="you-view" style="display:none; text-align:center; padding:30px 15px;">
                <div id="big-avatar" style="font-size:70px; margin-bottom:10px;">👤</div>
                <h2 id="prof-name">@User</h2>
                <div style="color:var(--pigeon); font-weight:bold; font-size:12px;">ULTRA VERIFIED ✓ | <span id="prof-xp">0 XP</span></div>
                <hr style="border:0; border-top:1px solid var(--border); margin:25px 0;">
                <div id="my-feed"></div>
            </div>
        </main>

        <div id="composer">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span onclick="closePost()" style="font-size:24px;">✕</span>
                <button onclick="publish()" id="publish-btn" style="background:var(--pigeon); color:white; border:none; padding:8px 22px; border-radius:20px; font-weight:bold;">Done</button>
            </div>
            <textarea id="p-text" placeholder="What's happening?"></textarea>
            <div id="preview" style="color:var(--pigeon); font-size:12px; margin-bottom:15px;"></div>
            <div style="display:flex; flex-wrap:wrap;">
                <input type="file" id="img-in" hidden accept="image/*" onchange="previewFile('Image')">
                <button class="tool-btn" onclick="document.getElementById('img-in').click()">+ Image</button>
                <input type="file" id="vid-in" hidden accept="video/*" onchange="previewFile('Video')">
                <button class="tool-btn" onclick="document.getElementById('vid-in').click()">+ Video</button>
                <button class="tool-btn" onclick="addPoll()">📊 Poll</button>
            </div>
        </div>

        <nav>
            <button class="nav-btn" onclick="openTab('home')">🏠</button>
            <button class="nav-btn" onclick="openTab('games')">🎮</button>
            <button class="nav-btn" onclick="openPost()" style="font-size:35px; color:var(--pigeon)">⊕</button>
            <button class="nav-btn" onclick="alert('Subs List')">🔔</button>
            <button class="nav-btn" onclick="openTab('you')">👤</button>
        </nav>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = { apiKey: "AIzaSyDCrAjMOIh0yD9Vp6Zdp8M", authDomain: "pigeon-platform.firebaseapp.com", projectId: "pigeon-platform", storageBucket: "pigeon-platform.firebasestorage.app", messagingSenderId: "322112493288", appId: "1:322112493288:web:f6e5ed8e0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let myName = ""; let selectedEmoji = "👤"; let subReady = false; 
        let selectedFile = null; let pollData = null; let xp = 0;

        // --- GATES ---
        function goSub() { window.open("https://youtube.com/@Ultra-wk8ed"); subReady = true; }
        function goVerify() {
            if(!subReady) return alert("Sub First!");
            document.getElementById('sub-choice').style.display='none';
            document.getElementById('verify-screen').style.display='flex';
            setTimeout(() => { document.getElementById('verify-screen').style.display='none'; document.getElementById('gate').style.display='flex'; }, 5000);
        }

        const emojis = ["🕊️", "🦁", "👑", "🚀", "💎", "🔥", "👾", "😎", "🦊", "🍕"];
        const picker = document.getElementById('emoji-picker');
        emojis.forEach(e => {
            const span = document.createElement('span'); span.className = 'emoji-opt'; span.innerText = e;
            span.onclick = () => { document.querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('selected')); span.classList.add('selected'); selectedEmoji = e; };
            picker.appendChild(span);
        });

        function finalize() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u.length >= 5 && p.length >= 10) {
                myName = u;
                document.getElementById('top-avatar').innerText = selectedEmoji;
                document.getElementById('big-avatar').innerText = selectedEmoji;
                document.getElementById('prof-name').innerText = "@" + u;
                document.getElementById('gate').style.display='none';
                document.getElementById('main-ui').style.display='block';
                document.getElementById('app').style.display='block';
                sync();
            } else { alert("Name 5+ | Password 10+"); }
        }

        // --- CORE LOGIC ---
        function openTab(t) {
            ['feed-view', 'games-view', 'you-view'].forEach(v => document.getElementById(v).style.display = 'none');
            document.getElementById(t + '-view').style.display = 'block';
        }
        function openPost() { document.getElementById('composer').style.display='flex'; }
        function closePost() { document.getElementById('composer').style.display='none'; selectedFile = null; }
        
        function previewFile(type) {
            selectedFile = document.getElementById(type === 'Image' ? 'img-in' : 'vid-in').files[0];
            document.getElementById('preview').innerText = "📎 Attachment: " + type;
        }

        function addPoll() {
            const q = prompt("Poll Question:");
            if(q) { pollData = { question: q, options: ["Yes", "No"] }; document.getElementById('preview').innerText = "📊 Poll Added"; }
        }

        function tapGame() {
            xp++;
            document.getElementById('game-score').innerText = xp + " XP";
            document.getElementById('prof-xp').innerText = xp + " XP";
        }

        async function publish() {
            const btn = document.getElementById('publish-btn');
            btn.innerText = "⏳";
            let url = ""; let type = "";
            if(selectedFile) {
                const ref = storage.ref(`uploads/${Date.now()}`);
                await ref.put(selectedFile);
                url = await ref.getDownloadURL();
                type = selectedFile.type.split('/')[0];
            }
            await db.collection("posts").add({
                user: myName, emoji: selectedEmoji, text: document.getElementById('p-text').value,
                media: url, mediaType: type, poll: pollData, time: firebase.firestore.FieldValue.serverTimestamp()
            });
            closePost();
            btn.innerText = "Done";
        }

        function sync() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                const f = document.getElementById('feed-view'); const mf = document.getElementById('my-feed');
                f.innerHTML = ""; mf.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    let mH = p.mediaType === 'image' ? `<img src="${p.media}" class="post-media">` : (p.mediaType === 'video' ? `<video src="${p.media}" controls class="post-media"></video>` : "");
                    let pH = p.poll ? `<div class="poll-box"><b>${p.poll.question}</b><div class="poll-opt">Yes</div><div class="poll-opt">No</div></div>` : "";
                    const card = `<div class="card"><div class="user-avatar">${p.emoji || '👤'}</div><div><b>@${p.user}</b><p>${p.text}</p>${mH}${pH}</div></div>`;
                    f.innerHTML += card;
                    if(p.user === myName) mf.innerHTML += card;
                });
            });
        }
    </script>
</body>
</html>
