<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pigeon Ultra | All-In-One</title>
    <style>
        :root { --pigeon: #1DA1F2; --dark: #000; --gray: #16181c; --border: #2f3336; --text: #f7f9f9; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- SCREENS --- */
        .overlay { position: fixed; inset: 0; background: white; color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; padding: 20px; text-align: center; }
        .black-bg { background: var(--dark) !important; color: white !important; display: none; }
        
        /* --- UI COMPONENTS --- */
        header { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; background: var(--dark); z-index:1000;}
        nav { height: 65px; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; background: var(--dark); z-index:1000;}
        #app { display: none; margin: 50px 0 65px; height: calc(100vh - 115px); overflow-y: auto; }

        /* --- CARDS & SOCIAL --- */
        .card { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gray); display: flex; align-items: center; justify-content: center; border: 1px solid var(--pigeon); font-weight: bold; }
        .post-media { width: 100%; border-radius: 15px; margin-top: 10px; max-height: 450px; object-fit: cover; border: 1px solid var(--border); }
        .action-bar { display: flex; gap: 15px; margin-top: 12px; }
        .action-btn { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .soc-row { display: flex; gap: 8px; margin-bottom: 4px; align-items: center; }
        .badge-btn { font-size: 10px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--pigeon); color: var(--pigeon); background: none; }

        /* --- COMMENTS --- */
        .comment-box { margin-left: 20px; margin-top: 10px; border-left: 1px solid var(--border); padding-left: 12px; font-size: 13px; }
        .reply-link { color: var(--pigeon); font-size: 11px; cursor: pointer; margin-left: 10px; }

        /* --- SHORTS --- */
        #shorts-view { display: none; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .short-item { height: calc(100vh - 115px); scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }

        /* --- STUDIO --- */
        #composer { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: none; flex-direction: column; padding: 20px; }
        textarea { width: 100%; height: 180px; background: none; border: none; color: white; font-size: 19px; outline: none; resize: none; }
        
        .btn-main { padding: 12px 30px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="sub-gate" class="overlay">
        <h1 style="font-size: 40px;">🕊️</h1>
        <h2>Pigeon Ultra</h2>
        <p>Unlock the Power</p>
        <button onclick="doSub()" class="btn-main" style="background:var(--pigeon); color:white; width:260px;">1. Subscribe to Ultra</button>
        <button onclick="doVerify()" class="btn-main" style="margin-top:10px; width:260px; background:#eee;">2. I Have Subscribed</button>
    </div>

    <div id="verify-load" class="overlay black-bg">
        <div style="border:4px solid #333; border-top-color:#fff; width:40px; height:40px; border-radius:50%; animation:spin 1s linear infinite"></div>
        <h3 style="margin-top:20px;">Verifying Ultra Status...</h3>
    </div>

    <div id="id-gate" class="overlay" style="display:none; background:#000; color:#fff;">
        <h2>Identity Setup</h2>
        <input type="text" id="user-in" placeholder="Username (5-10 chars)" maxlength="10" style="padding:12px; width:280px; border-radius:10px; margin-bottom:10px;">
        <input type="password" id="pass-in" placeholder="Password (10+ chars)" style="padding:12px; width:280px; border-radius:10px; margin-bottom:15px;">
        <button onclick="startApp()" class="btn-main" style="background:var(--pigeon); color:white;">Finalize Identity</button>
    </div>

    <div id="main-app" style="display:none">
        <header>
            <b style="color:var(--pigeon)">PIGEON ULTRA</b>
            <div id="nav-avatar" class="user-avatar" onclick="openTab('you')">👤</div>
        </header>

        <main id="app">
            <div id="feed-view"></div>
            <div id="shorts-view"></div>
            <div id="you-view" style="display:none; padding:20px;">
                <h2 id="prof-user">@Username</h2>
                <p style="color:var(--pigeon)">Ultra Verified ✓</p>
                <div id="my-posts"></div>
            </div>
        </main>

        <nav>
            <button onclick="openTab('home')" style="background:none; border:none; color:white;">🏠 Following</button>
            <button onclick="openTab('home')" style="background:none; border:none; color:white;">🏠 Home</button>
            <button onclick="openTab('shorts')" style="background:none; border:none; color:white;">🎬 Shorts</button>
            <button onclick="openStudio()" style="font-size:32px; color:var(--pigeon); background:none; border:none;">⊕</button>
            <button onclick="openTab('you')" style="background:none; border:none; color:white;">👤 You</button>
        </nav>
    </div>

    <div id="composer">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="closeStudio()" style="font-size:26px">✕</span>
            <button onclick="postNow()" id="post-btn" style="background:var(--pigeon); color:white; border:none; padding:8px 22px; border-radius:20px; font-weight:bold;">Post</button>
        </div>
        <textarea id="post-text" placeholder="Share something ultra..."></textarea>
        <div id="media-pre" style="color:var(--pigeon); font-size:12px; margin-bottom:10px;"></div>
        <input type="file" id="media-file" hidden onchange="document.getElementById('media-pre').innerText='📎 Media Ready'">
        <button onclick="document.getElementById('media-file').click()" style="background:var(--gray); color:white; border:none; padding:12px; border-radius:10px; width:fit-content;">+ Image/Video</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCrAjMOIh0yD9Vp6Zdp8MJ2qjip8dstdI",
            authDomain: "pigeon-platform.firebaseapp.com",
            projectId: "pigeon-platform",
            storageBucket: "pigeon-platform.firebasestorage.app",
            messagingSenderId: "322112493288",
            appId: "1:322112493288:web:f6e5ed8e0c1abb1c469b5d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.uName = ""; window.uPass = ""; window.subOk = false;

        // --- GATE LOGIC ---
        window.doSub = () => { window.open("https://youtube.com/@Ultra-wk8ed"); window.subOk = true; };
        window.doVerify = () => {
            if(!window.subOk) return alert("Please Subscribe first!");
            document.getElementById('sub-gate').style.display='none';
            document.getElementById('verify-load').style.display='flex';
            setTimeout(() => { 
                document.getElementById('verify-load').style.display='none'; 
                document.getElementById('id-gate').style.display='flex'; 
            }, 5000);
        };

        window.startApp = () => {
            const u = document.getElementById('user-in').value;
            const p = document.getElementById('pass-in').value;
            if(u.length < 5 || u.length > 10) return alert("Username: 5-10 chars");
            if(p.length < 10) return alert("Password: 10+ chars");
            window.uName = u; window.uPass = p;
            document.getElementById('prof-user').innerText = "@" + u;
            document.getElementById('id-gate').style.display='none';
            document.getElementById('main-app').style.display='block';
            document.getElementById('app').style.display='block';
            sync();
        };

        // --- NAV LOGIC ---
        window.openTab = (t) => {
            document.getElementById('feed-view').style.display = t === 'home' ? 'block' : 'none';
            document.getElementById('shorts-view').style.display = t === 'shorts' ? 'block' : 'none';
            document.getElementById('you-view').style.display = t === 'you' ? 'block' : 'none';
        };
        window.openStudio = () => document.getElementById('composer').style.display='flex';
        window.closeStudio = () => document.getElementById('composer').style.display='none';

        // --- SOCIAL ACTIONS ---
        window.react = async (id, type) => { await updateDoc(doc(db, "posts", id), { [type]: increment(1) }); };
        window.socialTrigger = (user, msg) => alert(`${msg} request sent to @${user}`);
        window.comment = async (pid, parentId = null) => {
            const txt = prompt(parentId ? "Reply to comment:" : "Add a comment:");
            if(txt) await addDoc(collection(db, "comments"), { pid, parentId, user: window.uName, text: txt, time: serverTimestamp() });
        };

        // --- PUBLISHING ---
        window.postNow = async () => {
            const btn = document.getElementById('post-btn'); btn.innerText = "⏳";
            const file = document.getElementById('media-file').files[0];
            let url = "", type = "";
            if(file) {
                const sRef = ref(storage, `uploads/${Date.now()}`);
                await uploadBytes(sRef, file);
                url = await getDownloadURL(sRef);
                type = file.type.split('/')[0];
            }
            await addDoc(collection(db, "posts"), {
                user: window.uName, pass: window.uPass, text: document.getElementById('post-text').value,
                media: url, mediaType: type, likes: 0, dislikes: 0, time: serverTimestamp()
            });
            window.closeStudio(); btn.innerText = "Post";
        };

        // --- THE SYNC ENGINE ---
        function sync() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                const f = document.getElementById('feed-view'); const s = document.getElementById('shorts-view');
                const mf = document.getElementById('my-posts');
                f.innerHTML = ""; s.innerHTML = ""; mf.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data(); const id = d.id;
                    let mHtml = p.mediaType === 'image' ? `<img src="${p.media}" class="post-media">` : (p.mediaType === 'video' ? `<video src="${p.media}" controls class="post-media"></video>` : "");
                    
                    const card = `
                        <div class="card">
                            <div class="user-avatar">${p.user[0].toUpperCase()}</div>
                            <div style="flex:1">
                                <div class="soc-row">
                                    <b>@${p.user}</b>
                                    <button class="badge-btn" onclick="socialTrigger('${p.user}', 'Follow')">Follow</button>
                                    <button class="badge-btn" onclick="socialTrigger('${p.user}', 'Friend')">Friend</button>
                                </div>
                                <p style="margin:5px 0;">${p.text}</p>
                                ${mHtml}
                                <div class="action-bar">
                                    <button class="action-btn" onclick="react('${id}', 'likes')">❤️ ${p.likes || 0}</button>
                                    <button class="action-btn" onclick="react('${id}', 'dislikes')">👎 ${p.dislikes || 0}</button>
                                    <button class="action-btn" onclick="comment('${id}')">💬 Comment</button>
                                </div>
                                <div id="comments-${id}" class="comment-box"></div>
                            </div>
                        </div>`;
                    
                    f.innerHTML += card;
                    if(p.user === window.uName) mf.innerHTML += card;
                    if(p.mediaType === 'video') {
                        s.innerHTML += `<div class="short-item"><video src="${p.media}" loop style="width:100%; height:100%;" onclick="this.paused?this.play():this.pause()"></video></div>`;
                    }
                    loadComments(id);
                });
            });
        }

        function loadComments(pid) {
            onSnapshot(query(collection(db, "comments"), where("pid", "==", pid), orderBy("time", "asc")), (snap) => {
                const zone = document.getElementById(`comments-${pid}`); if(!zone) return;
                zone.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    zone.innerHTML += `<div style="margin-bottom:5px;"><b>@${c.user}:</b> ${c.text} <span class="reply-link" onclick="comment('${pid}', '${d.id}')">Reply</span></div>`;
                });
            });
        }
    </script>
</body>
</html>
