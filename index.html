<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pigeon Ultra</title>
    <style>
        :root { --yt-black: #0f0f0f; --yt-border: #272727; --pigeon: #1DA1F2; --text: #ffffff; }
        * { box-sizing: border-box; font-family: "Roboto", sans-serif; }
        body { margin: 0; background: var(--yt-black); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- HEADER --- */
        header { 
            height: 56px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 16px; position: fixed; top: 0; width: 100%; background: var(--yt-black); z-index: 1000; 
        }
        .logo-trigger { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
        .logo-trigger:active { transform: scale(0.95); }

        /* --- YOUTUBE DOWN BAR (PIXEL PERFECT) --- */
        nav { 
            height: 50px; border-top: 1px solid var(--yt-border); display: flex; 
            justify-content: space-around; align-items: center; position: fixed; 
            bottom: 0; width: 100%; background: var(--yt-black); z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { 
            background: none; border: none; color: white; display: flex; 
            flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; flex: 1;
        }
        .nav-item i { font-size: 22px; margin-bottom: 3px; font-style: normal; }
        .plus-icon { font-size: 38px !important; font-weight: 100; margin-top: -5px; }

        /* --- GAME OVERLAY (EASTER EGG) --- */
        #game-overlay { 
            position: fixed; inset: 0; background: #70c5ce; z-index: 9999; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
        }
        canvas { border: 5px solid #fff; border-radius: 15px; background: #70c5ce; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* --- PROFILE --- */
        #you-view { display: none; padding: 20px; }
        .channel-header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .avatar-main { 
            width: 80px; height: 80px; border-radius: 50%; background: var(--pigeon); 
            display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; 
        }

        /* --- VIEW CONTROLS --- */
        #app { margin: 56px 0 50px; height: calc(100vh - 106px); overflow-y: auto; }
        #studio { position: fixed; inset: 0; background: #000; z-index: 8000; display: none; padding: 20px; }
    </style>
</head>
<body>

    <div id="game-overlay">
        <h2 style="color:white; margin-bottom:10px; font-weight:900;">FLAPPY PIGEON</h2>
        <canvas id="flappyCanvas" width="320" height="480"></canvas>
        <p style="color:white; margin-top:10px;">Tap to Fly | Avoid Borders</p>
        <button onclick="stopGame()" style="margin-top:15px; padding:12px 30px; border-radius:20px; border:none; background:red; color:white; font-weight:bold;">EXIT GAME</button>
    </div>

    <div id="main-ui">
        <header>
            <div class="logo-trigger" onclick="launchEgg()">
                <span style="font-size:26px;">🕊️</span>
                <span style="font-weight:900; font-size:20px; letter-spacing:-1px;">Pigeon</span>
            </div>
            <div style="display:flex; gap:20px; font-size:20px;">🔔 🔍</div>
        </header>

        <main id="app">
            <div id="home-view">
                <div style="padding:20px; color:#888; text-align:center;">Welcome to the Feed</div>
            </div>
            
            <div id="shorts-view" style="display:none; height:100%; background:black;">
                </div>

            <div id="you-view">
                <div class="channel-header">
                    <div class="avatar-main" id="u-initial">P</div>
                    <div>
                        <h2 id="u-display" style="margin:0">Pigeon User</h2>
                        <p style="margin:0; color:#aaa;">@channel • View channel</p>
                    </div>
                </div>
                <hr style="border:0; border-top:1px solid var(--yt-border); margin-bottom:20px;">
                <div id="user-posts"></div>
            </div>
        </main>

        <nav>
            <button class="nav-item" onclick="showTab('home')"><i>🏠</i>Home</button>
            <button class="nav-item" onclick="showTab('shorts')"><i>🎬</i>Shorts</button>
            <button class="nav-item plus-icon" onclick="openStudio()">+</button>
            <button class="nav-item"><i>📺</i>Subscriptions</button>
            <button class="nav-item" onclick="showTab('you')"><i>👤</i>You</button>
        </nav>
    </div>

    <div id="studio">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="closeStudio()" style="font-size:28px;">✕</span>
            <button onclick="finishPost()" style="background:white; color:black; border:none; padding:8px 20px; border-radius:20px; font-weight:bold;">Post</button>
        </div>
        <textarea id="p-input" placeholder="What's on your mind?" style="width:100%; height:250px; background:none; border:none; color:white; font-size:20px; margin-top:30px; outline:none;"></textarea>
    </div>

    <script>
        // --- NAVIGATION LOGIC ---
        function showTab(t) {
            ['home-view', 'shorts-view', 'you-view'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById(t + '-view').style.display = 'block';
        }

        function openStudio() { document.getElementById('studio').style.display = 'block'; }
        function closeStudio() { document.getElementById('studio').style.display = 'none'; }

        function finishPost() {
            // After posting, redirect to Home
            alert("Post Uploaded!");
            closeStudio();
            showTab('home');
            document.getElementById('p-input').value = "";
        }

        // --- FLAPPY PIGEON EASTER EGG ---
        const canvas = document.getElementById('flappyCanvas');
        const ctx = canvas.getContext('2d');
        let birdY, birdV, gameLoop;

        function launchEgg() {
            document.getElementById('game-overlay').style.display = 'flex';
            birdY = 200;
            birdV = 0;
            gameLoop = setInterval(updateGame, 20);
        }

        function stopGame() {
            clearInterval(gameLoop);
            document.getElementById('game-overlay').style.display = 'none';
        }

        canvas.onclick = () => { birdV = -7; };

        function updateGame() {
            // Background
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, 320, 480);
            
            // Physics
            birdV += 0.4;
            birdY += birdV;

            // Draw Pigeon
            ctx.font = "35px Arial";
            ctx.fillText("🕊️", 50, birdY);

            // Floor/Ceiling collision
            if(birdY > 480 || birdY < 0) {
                alert("Game Over!");
                stopGame();
            }
        }

        // Initialize with Home tab
        showTab('home');
    </script>
</body>
</html>
