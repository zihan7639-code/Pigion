<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pigeon Ultra | Final Master</title>
    <style>
        :root { --yt-black: #0f0f0f; --yt-border: #272727; --pigeon: #1DA1F2; --text: #ffffff; --gray: #aaaaaa; }
        * { box-sizing: border-box; font-family: "Roboto", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--yt-black); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- AUTH GATE --- */
        .gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .input-f { padding: 14px; width: 280px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; margin-bottom: 12px; outline: none; }
        .btn-p { padding: 14px 40px; border-radius: 30px; background: var(--pigeon); color: white; border: none; font-weight: bold; cursor: pointer; width: 280px; }

        /* --- HEADER & NAV --- */
        header { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: fixed; top: 0; width: 100%; background: var(--yt-black); z-index: 1000; border-bottom: 1px solid var(--yt-border); }
        nav { height: 50px; border-top: 1px solid var(--yt-border); display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; background: var(--yt-black); z-index: 1000; }
        .nav-item { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; font-size: 10px; flex: 1; }
        .plus-btn { font-size: 40px !important; margin-top: -5px; }

        /* --- FEED & CARDS --- */
        #app { margin-top: 56px; margin-bottom: 50px; height: calc(100vh - 106px); overflow-y: auto; }
        .card { padding: 15px; border-bottom: 8px solid var(--yt-border); position: relative; }
        .media-box { width: 100%; border-radius: 12px; margin-top: 10px; background: #1a1a1a; overflow: hidden; }
        
        /* --- POLLS --- */
        .poll-opt { background: #222; padding: 12px; border-radius: 8px; margin-top: 6px; border: 1px solid #333; position: relative; overflow: hidden; }
        .poll-fill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(29, 161, 242, 0.2); width: 0%; transition: 0.5s; }

        /* --- STUDIO & TOOLS --- */
        #studio { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; padding: 20px; }
        .tools { display: flex; gap: 15px; margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; }
        .tool { background: #1a1a1a; border: none; color: white; padding: 12px; border-radius: 10px; font-size: 20px; }

        /* --- GAME --- */
        #game-overlay { position: fixed; inset: 0; background: #70c5ce; z-index: 11000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="id-gate" class="gate">
        <h1 style="color:var(--pigeon); font-size: 50px; margin:0;">🕊️</h1>
        <h2 style="margin-bottom:20px;">Pigeon Ultra</h2>
        <input type="text" id="u-name" class="input-f" placeholder="Handle (5-10 chars)" maxlength="10">
        <input type="password" id="u-pass" class="input-f" placeholder="Password (10+ chars)">
        <button onclick="entry()" class="btn-p">Start Session</button>
    </div>

    <div id="game-overlay">
        <canvas id="flappy" width="320" height="480" style="border:5px solid #fff; border-radius:15px;"></canvas>
        <button onclick="stopGame()" style="margin-top:20px; background:red; color:white; border:none; padding:10px 30px; border-radius:20px; font-weight:bold;">CLOSE GAME</button>
    </div>

    <div id="main-ui" style="display:none">
        <header>
            <div onclick="launchGame()" style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <span style="font-size:24px;">🕊️</span>
                <span style="font-weight:900; font-size:20px;">Pigeon</span>
            </div>
            <div style="font-size:20px;">🔍 🔔</div>
        </header>

        <main id="app">
            <div id="feed"></div>
        </main>

        <nav>
            <button class="nav-item" onclick="tab('home')"><i>🏠</i>Home</button>
            <button class="nav-item" onclick="tab('shorts')"><i>🎬</i>Shorts</button>
            <button class="nav-item plus-btn" onclick="openStudio()">+</button>
            <button class="nav-item"><i>📺</i>Subs</button>
            <button class="nav-item" onclick="tab('you')"><i>👤</i>You</button>
        </nav>
    </div>

    <div id="studio">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="closeStudio()" style="font-size:28px;">✕</span>
            <button onclick="postNow()" style="background:white; color:black; border:none; padding:8px 25px; border-radius:20px; font-weight:bold;">Post</button>
        </div>
        <textarea id="p-input" placeholder="What's happening?" style="width:100%; height:150px; background:none; border:none; color:white; font-size:20px; margin-top:30px; outline:none; resize:none;"></textarea>
        
        <div id="poll-ui" style="display:none; background:#111; padding:15px; border-radius:12px; margin-bottom:15px;">
            <input type="text" id="o1" class="input-f" style="width:100%" placeholder="Choice 1">
            <input type="text" id="o2" class="input-f" style="width:100%" placeholder="Choice 2">
        </div>

        <div id="status-tag" style="color:var(--pigeon); font-size:12px; margin-bottom:10px;"></div>

        <div class="tools">
            <button class="tool" onclick="tag('Image')">🖼️</button>
            <button class="tool" onclick="tag('Video')">🎥</button>
            <button class="tool" onclick="togglePoll()">📊</button>
            <button class="tool" onclick="tag('Voice')">🎙️</button>
        </div>
    </div>

    <script>
        let user = "";
        let currentTag = null;
        let pollActive = false;

        function entry() {
            const n = document.getElementById('u-name').value;
            const p = document.getElementById('u-pass').value;
            if(n.length < 5 || p.length < 10) return alert("Handle: 5-10 | Pass: 10+");
            user = n;
            document.getElementById('id-gate').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            addPost({user: 'System', text: 'Welcome to the Ultra Build! Tap the bird logo to play.', type: 'Image'});
        }

        function tab(t) { if(t === 'home') document.getElementById('feed').scrollIntoView(); }
        function openStudio() { document.getElementById('studio').style.display = 'flex'; }
        function closeStudio() { document.getElementById('studio').style.display = 'none'; }
        function tag(type) { currentTag = type; document.getElementById('status-tag').innerText = "Attached: " + type; }
        function togglePoll() { pollActive = !pollActive; document.getElementById('poll-ui').style.display = pollActive ? 'block' : 'none'; }

        // --- THE INSTANT LOGIC ---
        function postNow() {
            const txt = document.getElementById('p-input').value;
            if(!txt && !currentTag) return;

            // 1. Snapshot the data for the feed
            const postData = {
                user: user,
                text: txt,
                type: currentTag,
                poll: pollActive ? [document.getElementById('o1').value, document.getElementById('o2').value] : null
            };

            // 2. WIPE EVERYTHING IMMEDIATELY
            document.getElementById('p-input').value = "";
            document.getElementById('o1').value = "";
            document.getElementById('o2').value = "";
            document.getElementById('status-tag').innerText = "";
            currentTag = null; pollActive = false;
            document.getElementById('poll-ui').style.display = 'none';

            // 3. TELEPORT HOME IMMEDIATELY
            closeStudio();
            addPost(postData);
            alert("Sent!");
        }

        function addPost(p) {
            const feed = document.getElementById('feed');
            let attachmentHtml = "";
            
            if(p.type === 'Image') attachmentHtml = `<div class="media-box" style="height:180px; display:flex; align-items:center; justify-content:center; color:#444;">[Image Attached]</div>`;
            if(p.type === 'Video') attachmentHtml = `<div class="media-box" style="height:180px; background:#000; display:flex; align-items:center; justify-content:center;">▶️ Video File</div>`;
            if(p.type === 'Voice') attachmentHtml = `<div class="media-box" style="padding:15px; display:flex; align-items:center; gap:10px;"><button style="border-radius:50%; border:none; width:35px; height:35px; background:var(--pigeon);">▶</button> <div style="flex:1; height:3px; background:#333;"></div> <span>0:15</span></div>`;
            if(p.poll) attachmentHtml = `<div style="margin-top:10px;"><div class="poll-opt"><div class="poll-fill" style="width:30%"></div>${p.poll[0]}</div><div class="poll-opt"><div class="poll-fill" style="width:70%"></div>${p.poll[1]}</div></div>`;

            const card = `
                <div class="card">
                    <b style="color:var(--pigeon)">@${p.user}</b>
                    <p style="margin:8px 0;">${p.text}</p>
                    ${attachmentHtml}
                    <div style="margin-top:12px; display:flex; gap:20px; font-size:13px; color:var(--gray);">
                        <span>❤️ Like</span> <span>💬 Reply</span> <span>🔄 Repost</span>
                    </div>
                    <div style="margin-top:10px; padding-left:15px; border-left:2px solid #222; font-size:12px; color:#666;">
                        <b>@Moderator:</b> High quality post!
                    </div>
                </div>
            `;
            feed.innerHTML = card + feed.innerHTML;
        }

        // --- FLAPPY PIGEON WITH PIPES ---
        const cvs = document.getElementById('flappy'); const ctx = cvs.getContext('2d');
        let bY, bV, pipes, score, loop;
        function launchGame() {
            document.getElementById('game-overlay').style.display = 'flex';
            bY = 240; bV = 0; pipes = []; score = 0;
            loop = setInterval(() => {
                ctx.fillStyle = "#70c5ce"; ctx.fillRect(0,0,320,480);
                bV += 0.35; bY += bV;
                if(Math.random() < 0.015) pipes.push({x: 320, h: Math.random()*200+50, gap: 130});
                ctx.fillStyle = "#2ecc71";
                pipes.forEach(p => { 
                    p.x -= 3; 
                    ctx.fillRect(p.x, 0, 50, p.h); ctx.fillRect(p.x, p.h+p.gap, 50, 480);
                    if(p.x === 50) score++;
                    if(p.x > 20 && p.x < 80 && (bY < p.h || bY > p.h+p.gap)) stopGame();
                });
                pipes = pipes.filter(p => p.x > -50);
                ctx.font = "30px Arial"; ctx.fillText("🕊️", 50, bY);
                ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.fillText("SCORE: " + score, 15, 30);
                if(bY > 480 || bY < 0) stopGame();
            }, 20);
        }
        function stopGame() { clearInterval(loop); document.getElementById('game-overlay').style.display = 'none'; }
        cvs.onclick = () => bV = -6;
    </script>
</body>
</html>
